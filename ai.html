<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Result - InvestoMicro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            padding: 40px; 
            max-width: 520px; 
            margin: auto; 
            text-align: center; 
            background: #0f172a; 
            color: white; 
            display: flex; 
            align-items: center; 
            min-height: 100vh; 
        }
        .card { 
            padding: 30px; 
            border-radius: 24px; 
            background: #1e293b; 
            border: 1px solid #334155; 
            width: 100%; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        h3 { color: #60a5fa; font-size: 1.55rem; margin: 20px 0; letter-spacing: -0.5px; }
        .desc { color: #94a3b8; line-height: 1.6; margin-bottom: 25px; min-height: 80px; }
        button { 
            padding: 16px; 
            background: #3b82f6; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%; 
            font-size: 1.05rem;
        }
        button:hover:not(:disabled) { background: #2563eb; transform: translateY(-2px); }
        button:disabled { background: #475569; cursor: not-allowed; }
        .status { font-size: 0.8rem; color: #64748b; margin-top: 12px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: #94a3b8; font-size: 1rem; text-transform: uppercase; letter-spacing: 2px;">AI Spend Analysis</h2>
        <h3 id="cat">Analyzing with Gemini...</h3>
        <p id="desc" class="desc"></p>
        <button id="saveBtn">Confirm & Save</button>
        <p id="saveStatus" class="status"></p>
    </div>

<script type="module">
    const GEMINI_API_KEY = "YOUR_GEMINI_API_KEY_HERE";   // ←←← PUT YOUR KEY HERE

    const S_URL = 'https://funcvigewkhauenqxrbf.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1bmN2aWdld2toYXVlbnF4cmJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NTM1MzQsImV4cCI6MjA5NDEyOTUzNH0.INR7nkrv-CV80i97SyaHwdZd3chlQjaVgNsQY39Nqxo';
    
    const _supabase = supabase.createClient(S_URL, S_KEY);

    const sms = (localStorage.getItem('lastSMS') || "").trim();
    const catElement = document.getElementById('cat');
    const descElement = document.getElementById('desc');
    const saveBtn = document.getElementById('saveBtn');

    let finalCategory = "Short Term Not Necessary";
    let finalAmount = 0;

    function extractAmount(text) {
        const regex = /(?:₹|Rs\.?|INR)?\s*(\d{1,3}(?:,\d{3})*|\d+)(?:\.\d{1,2})?/gi;
        let match, max = 0;
        while ((match = regex.exec(text)) !== null) {
            const num = parseFloat(match[1].replace(/,/g, ''));
            if (num > max) max = num;
        }
        return max;
    }

    finalAmount = extractAmount(sms);

    async function runAnalysis() {
        saveBtn.disabled = true;
        catElement.innerText = "Gemini Analyzing...";

        try {
            const prompt = `
Analyze this expense message and classify it into exactly one category.
Message: "${sms}"

Categories:
- Long Term Necessary (education, farm assets, house, rent, medical, insurance, etc.)
- Short Term Important (daily groceries, milk, vegetables, transport, utilities)
- Short Term Not Necessary (luxury, entertainment, impulse buys)
- Long Term Not Necessary (big non-essential purchases)

Return only the category name. Also give one short reason.
`;

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });

            const data = await response.json();
            const resultText = data.candidates?.[0]?.content?.parts?.[0]?.text || "";

            // Extract category
            if (resultText.toLowerCase().includes("long term necessary")) {
                finalCategory = "Long Term Necessary";
            } else if (resultText.toLowerCase().includes("short term important")) {
                finalCategory = "Short Term Important";
            } else if (resultText.toLowerCase().includes("long term not necessary")) {
                finalCategory = "Long Term Not Necessary";
            } else {
                finalCategory = "Short Term Not Necessary";
            }

            descElement.innerHTML = `<strong>${finalCategory}</strong><br><small>${resultText}</small>`;

        } catch (e) {
            console.error(e);
            descElement.innerText = "Gemini failed. Using fallback rules...";
            finalCategory = applyFallbackRules(sms);
        }

        catElement.innerText = finalCategory;
        saveBtn.innerText = `Confirm & Save ₹${finalAmount}`;
        saveBtn.disabled = false;
    }

    function applyFallbackRules(text) {
        const lower = text.toLowerCase();
        if (/fence|buffalo|cow|goat|farm|tractor|land|school|college|fee|textbook|medical|rent|emi|loan/i.test(lower)) {
            return "Long Term Necessary";
        }
        if (/milk|grocery|vegetable|gas|internet/i.test(lower)) {
            return "Short Term Important";
        }
        return "Short Term Not Necessary";
    }

    window.saveToCloud = async () => {
        saveBtn.innerText = "Saving...";
        saveBtn.disabled = true;

        try {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) return alert("Please login first");

            const { error } = await _supabase.from('spends').insert([{
                user_id: user.id,
                category: finalCategory,
                description: sms,
                amount: finalAmount,
                created_at: new Date().toISOString()
            }]);

            if (!error) window.location.href = 'patterns.html';
            else alert("Save error: " + error.message);
        } catch (err) {
            alert("Save failed");
            saveBtn.innerText = `Confirm & Save ₹${finalAmount}`;
            saveBtn.disabled = false;
        }
    };

    if (!sms) {
        catElement.innerText = "No SMS found";
    } else {
        runAnalysis();
    }
</script>
</body>
</html>
