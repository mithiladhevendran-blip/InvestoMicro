<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvestoMicro v2.0</title>
    <!-- ⚡ Version suffix forces mobile browsers to drop broken cached scripts -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #0f172a; margin: 0; color: white; }
        .box { background: #1e293b; padding: 2rem; border-radius: 24px; width: 320px; text-align: center; border: 1px solid #334155; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; outline: none; }
        input:focus { border-color: #3b82f6; }
        .mask-password { -webkit-text-security: disc; text-security: disc; }
        .btn-login { width: 100%; padding: 14px; background: #3b82f6; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 15px; }
        .btn-signup { width: 100%; padding: 12px; background: transparent; color: #94a3b8; border: 1px solid #334155; border-radius: 12px; cursor: pointer; margin-top: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="box">
        <h2>InvestoMicro</h2>
        <input type="text" id="email" placeholder="Email" autocomplete="off">
        <input type="text" id="password" class="mask-password" placeholder="Password" autocomplete="off">
        
        <button class="btn-login" onclick="handleLogin()">Sign In</button>
        <button class="btn-signup" onclick="handleSignUp()">Create Account</button>
    </div>

    <script>
        const S_URL = 'https://supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1bmN2aWdld2toYXVlbnF4cmJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NTM1MzQsImV4cCI6MjA5NDEyOTUzNH0.INR7nkrv-CV80i97SyaHwdZd3chlQjaVgNsQY39Nqxo';
        
        const _supabase = supabase.createClient(S_URL, S_KEY, {
            auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false }
        });

        // Instant session forwarder
        async function checkSession() {
            const { data } = await _supabase.auth.getSession();
            if (data?.session) {
                window.location.href = 'input.html';
            }
        }
        checkSession();

        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            if(!email || !password) return alert("Please fill out all fields.");
            
            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
            
            if (error) {
                alert("Login failed: " + error.message);
            } else if (data?.session) {
                window.location.href = 'input.html';
            }
        }

        async function handleSignUp() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if(!email || !password) return alert("Please fill out all fields.");

            const { data, error } = await _supabase.auth.signUp({ email, password });

            if (error) {
                alert("Signup failed: " + error.message);
            } else {
                alert("Account created successfully! You can sign in right away.");
            }
        }
    </script>
</body>
</html>
