<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Analysis - InvestoMicro</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; margin:0; padding:20px; min-height:100vh; }
        .card { background:#1e293b; padding:30px; border-radius:24px; border:1px solid #334155; box-shadow:0 10px 30px rgba(0,0,0,0.5); margin-bottom: 80px; }
        h3 { color:#60a5fa; font-size:1.6rem; margin: 10px 0; }
        .desc { color:#94a3b8; line-height:1.6; min-height:80px; margin:15px 0; }
        button { width:100%; padding:16px; margin:10px 0; border:none; border-radius:12px; font-weight:bold; cursor:pointer; font-size:1.05rem; transition: 0.2s; }
        button:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
        .primary { background:#3b82f6; color: white; }
        .secondary { background:#475569; color: white; }
        .nav { position:fixed; bottom:0; left:0; right:0; background:#1e293b; border-top:1px solid #334155; display:flex; padding:10px; max-width:520px; margin:0 auto; }
        .nav button { flex:1; margin:0 4px; padding:14px; background:#334155; border:none; border-radius:12px; color:white; font-size:0.95rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:#94a3b8; font-size:1rem; text-transform:uppercase; margin:0;">AI Spend Analysis</h2>
        <h3 id="cat">Analyzing with Gemini...</h3>
        <p id="desc" class="desc">Please wait...</p>
        
        <button id="saveBtn" class="primary" disabled>Loading...</button>
        <button id="skipBtn" class="secondary" onclick="location.href='patterns.html'">Skip → Patterns</button>
    </div>

    <div class="nav">
        <button onclick="location.href='ai.html'">AI Analysis</button>
        <button onclick="location.href='patterns.html'">Patterns</button>
        <button onclick="location.href='suggest.html'">Suggestions</button>
    </div>

<script type="module">
    // CONFIGURATION
    const GEMINI_KEY = "YOUR_GEMINI_API_KEY_HERE"; 
    const SUPABASE_URL = "YOUR_SUPABASE_URL_HERE";
    const SUPABASE_KEY = "YOUR_SUPABASE_ANON_KEY_HERE";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Mock data representing the latest user transaction
    const transaction = { amount: 1250, description: "Uber ride to corporate office" };
    let analyzedData = null;

    async function analyzeTransaction() {
        const url = `https://googleapis.com{GEMINI_KEY}`;
        
        try {
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    // System instruction anchors the AI context to block off-topic hallucinations
                    systemInstruction: {
                        parts: [{ text: "You are a strict personal finance backend JSON API. Categorize consumer expenses and give a 1-sentence budget tip." }]
                    },
                    contents: [{
                        parts: [{ text: `Amount: ${transaction.amount}, Text: "${transaction.description}"` }]
                    }],
                    generationConfig: {
                        // Forces the AI to respond with pure JSON matching this exact structure
                        responseMimeType: "application/json",
                        responseSchema: {
                            type: "OBJECT",
                            properties: {
                                category: { type: "STRING", description: "Category name with a relevant emoji" },
                                summary: { type: "STRING", description: "Short budgeting tip under 15 words" }
                            },
                            required: ["category", "summary"]
                        }
                    }
                })
            });

            const resData = await response.json();
            // Parse the forced JSON string response from Gemini
            analyzedData = JSON.parse(resData.candidates[0].content.parts[0].text);

            // Update UI elements smoothly
            document.getElementById('cat').innerText = analyzedData.category;
            document.getElementById('desc').innerText = analyzedData.summary;
            
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.innerText = `Confirm & Save ₹${transaction.amount}`;
            saveBtn.disabled = false;
            saveBtn.onclick = saveToSupabase;

        } catch (err) {
            document.getElementById('cat').innerText = "Analysis Failed";
            document.getElementById('desc').innerText = "Make sure your API keys are valid and try again.";
            console.error(err);
        }
    }

    async function saveToSupabase() {
        const btn = document.getElementById('saveBtn');
        btn.disabled = true;
        btn.innerText = "Saving...";

        // Inserts the transaction and AI data into your database table
        const { error } = await supabaseClient
            .from('expenses') 
            .insert([{
                amount: transaction.amount,
                description: transaction.description,
                category: analyzedData.category,
                tip: analyzedData.summary,
                created_at: new Date()
            }]);

        if (error) {
            alert("Error saving: " + error.message);
            btn.disabled = false;
            btn.innerText = "Try Saving Again";
        } else {
            alert("Transaction saved successfully!");
            location.href = 'patterns.html'; // Redirect on success
        }
    }

    // Trigger analysis on page load
    window.onload = analyzeTransaction;
</script>
</body>
</html>
