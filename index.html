<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvestoMicro v2.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #0f172a; margin: 0; color: white; }
        .box { background: #1e293b; padding: 2rem; border-radius: 24px; width: 320px; text-align: center; border: 1px solid #334155; }
        input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #3b82f6; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .version { font-size: 10px; color: #475569; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <h2 id="title">InvestoMicro</h2>
        <input type="email" id="email" placeholder="Email (e.g. user@test.com)">
        <input type="password" id="password" placeholder="Password">
        <button id="authBtn">Sign In / Sign Up</button>
        <div class="version">Update Tag: VER_FIX_99</div>
    </div>

    <script>
        // The URL starts with https://
const S_URL = 'https://funcvigewkhauenqxrbf.supabase.co';

// The Key starts with sb_publishable
const S_KEY = 'sb_publishable_lviXZqO83JXjjZu6q9BPVA_AAIRSx_j...';

        const _supabase = supabase.createClient(S_URL, S_KEY);

        document.getElementById('authBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Attempt Login first
            const { data, error: loginErr } = await _supabase.auth.signInWithPassword({ email, password });
            
            if (loginErr) {
                // If login fails, try signing up automatically
                const { error: signUpErr } = await _supabase.auth.signUp({ email, password });
                if (signUpErr) alert(signUpErr.message);
                else alert("Account created! Check your email for a link.");
            } else {
                window.location.href = 'input.html';
            }
        };
    </script>
</body>
</html>
