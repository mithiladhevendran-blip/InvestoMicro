<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Analysis - InvestoMicro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; margin:0; padding:20px; min-height:100vh; }
        .card { background:#1e293b; padding:30px; border-radius:24px; border:1px solid #334155; box-shadow:0 10px 30px rgba(0,0,0,0.5); }
        h3 { color:#60a5fa; font-size:1.6rem; }
        .desc { color:#94a3b8; line-height:1.6; min-height:120px; margin:15px 0; }
        button { width:100%; padding:16px; margin:10px 0; border:none; border-radius:12px; font-weight:bold; cursor:pointer; font-size:1.05rem; }
        .primary { background:#3b82f6; }
        .secondary { background:#475569; }
        .nav { position:fixed; bottom:0; left:0; right:0; background:#1e293b; border-top:1px solid #334155; display:flex; padding:10px; max-width:520px; margin:0 auto; }
        .nav button { flex:1; margin:0 4px; padding:14px; background:#334155; border:none; border-radius:12px; color:white; font-size:0.95rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:#94a3b8; font-size:1rem; text-transform:uppercase;">AI Spend Analysis</h2>
        <h3 id="cat">Analyzing with Gemini...</h3>
        <p id="desc" class="desc">Please wait...</p>
        
        <button id="saveBtn" class="primary" disabled>Confirm & Save ₹0</button>
        <button id="skipBtn" class="secondary">Skip → Patterns</button>
    </div>

    <div class="nav">
        <button onclick="location.href='ai.html'">AI Analysis</button>
        <button onclick="location.href='patterns.html'">Patterns</button>
        <button onclick="location.href='suggest.html'">Suggestions</button>
    </div>

<script type="module">
    const GEMINI_KEY = "YOUR_GEMINI_API_KEY_HERE";   // ←←← Change this

    const _supabase = supabase.createClient(
        'https://funcvigewkhauenqxrbf.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1bmN2aWdld2toYXVlbnF4cmJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NTM1MzQsImV4cCI6MjA5NDEyOTUzNH0.INR7nkrv-CV80i97SyaHwdZd3chlQjaVgNsQY39Nqxo'
    );

    const sms = (localStorage.getItem('lastSMS') || "").trim();
    let finalCategory = "Short Term Not Necessary";
    let finalAmount = 0;

    function extractAmount(text) {
        const matches = text.match(/\d+(?:,\d+)*(?:\.\d+)?/g);
        return matches ? Math.max(...matches.map(m => parseFloat(m.replace(/,/g,'')))) : 0;
    }
    finalAmount = extractAmount(sms);

    async function runAnalysis() {
        document.getElementById('saveBtn').disabled = true;
        document.getElementById('cat').innerText = "Gemini Analyzing...";

        // Timeout fallback (max 5 seconds)
        const timeoutId = setTimeout(() => {
            const lower = sms.toLowerCase();
            finalCategory = /buffalo|fence|farm|school|college|fee|medical|rent|emi|loan/i.test(lower) 
                ? "Long Term Necessary" 
                : "Short Term Important";
            document.getElementById('desc').innerText = "Gemini was slow → Used rules";
            finishUI();
        }, 5000);

        try {
            const prompt = `SMS: "${sms}" (₹${finalAmount}). Classify as: Long Term Necessary, Short Term Important, Short Term Not Necessary or Long Term Not Necessary. Reply with only the category name.`;

            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_KEY}`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ 
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { temperature: 0.1, maxOutputTokens: 100 }
                })
            });

            clearTimeout(timeoutId);
            const data = await res.json();
            const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";

            if (text.includes("Long Term Necessary")) finalCategory = "Long Term Necessary";
            else if (text.includes("Short Term Important")) finalCategory = "Short Term Important";
            else if (text.includes("Long Term Not Necessary")) finalCategory = "Long Term Not Necessary";
            else finalCategory = "Short Term Not Necessary";

            document.getElementById('desc').innerHTML = `<strong>${finalCategory}</strong><br><small>${text}</small>`;

        } catch (e) {
            clearTimeout(timeoutId);
            document.getElementById('desc').innerText = "Using fallback rules";
        }

        finishUI();
    }

    function finishUI() {
        document.getElementById('cat').innerText = finalCategory;
        document.getElementById('saveBtn').innerText = `Confirm & Save ₹${finalAmount}`;
        document.getElementById('saveBtn').disabled = false;
    }

    window.saveToCloud = async () => {
        const btn = document.getElementById('saveBtn');
        btn.innerText = "Saving..."; 
        btn.disabled = true;

        try {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) return alert("Please login first");

            await _supabase.from('spends').insert([{
                user_id: user.id,
                category: finalCategory,
                description: sms,
                amount: finalAmount,
                created_at: new Date().toISOString()
            }]);

            alert("✅ Saved!");
            location.href = 'patterns.html';
        } catch (err) {
            alert("Save failed");
            btn.innerText = `Confirm & Save ₹${finalAmount}`;
            btn.disabled = false;
        }
    };

    document.getElementById('skipBtn').onclick = () => location.href = 'patterns.html';

    if (sms) runAnalysis();
    else document.getElementById('cat').innerText = "No SMS Found";
</script>
</body>
</html>
