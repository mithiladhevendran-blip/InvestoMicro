<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - InvestoMicro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; padding: 20px; background: #0f172a; color: white; text-align: center; }
        .container { max-width: 500px; margin: auto; }
        .chart-box { background: #1e293b; padding: 20px; border-radius: 24px; margin-bottom: 30px; min-height: 250px; display: flex; justify-content: center; align-items: center; }
        .item { background: #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
        .cat-tag { font-size: 0.7rem; padding: 4px 12px; border-radius: 20px; border: 1px solid #3b82f6; color: #60a5fa; }
        .btn-advice { width: 100%; padding: 16px; background: #6366f1; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Spending Breakdown</h2>
        
        <div class="chart-box">
            <canvas id="myChart"></canvas>
        </div>

        <div id="history">Loading data...</div>
        
        <button class="btn-advice" onclick="window.location.href='suggest.html'">Get Investment Advice</button>
    </div>

    <script>
        const S_URL = 'https://funcvigewkhauenqxrbf.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1bmN2aWdld2toYXVlbnF4cmJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NTM1MzQsImV4cCI6MjA5NDEyOTUzNH0.INR7nkrv-CV80i97SyaHwdZd3chlQjaVgNsQY39Nqxo';
        const _supabase = supabase.createClient(S_URL, S_KEY);

        async function loadData() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) window.location.href = 'index.html';

            const { data, error } = await _supabase
                .from('spends')
                .select('*')
                .order('created_at', { ascending: false });

            if (data) {
                renderList(data);
                renderChart(data);
            }
        }

        function renderList(data) {
            const div = document.getElementById('history');
            div.innerHTML = data.map(item => `
                <div class="item">
                    <span style="font-size: 0.8rem; color: #94a3b8;">${new Date(item.created_at).toLocaleDateString()}</span>
                    <span class="cat-tag">${item.category}</span>
                </div>
            `).join('');
        }

        function renderChart(data) {
            // Count how many times each category appears
            const counts = {};
            data.forEach(item => {
                counts[item.category] = (counts[item.category] || 0) + 1;
            });

            const ctx = document.getElementById('myChart').getContext('2d');
            new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: Object.keys(counts),
                    datasets: [{
                        data: Object.values(counts),
                        backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444'],
                        borderWidth: 0
                    }]
                },
                options: {
                    plugins: {
                        legend: { display: false } // Keeping it clean
                    }
                }
            });
        }

        loadData();
    </script>
</body>
</html>
