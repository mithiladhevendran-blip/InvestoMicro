<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Savings Plan - InvestoMicro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --border-color: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-emerald: #10b981;
        }

        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: var(--bg-main); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-bottom: 120px; 
            box-sizing: border-box; 
        }
        
        .container { width: 100%; max-width: 480px; box-sizing: border-box; }
        
        .top-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            width: 100%; 
            background: var(--bg-card); 
            padding: 12px 18px; 
            border-radius: 16px; 
            border: 1px solid var(--border-color); 
            margin-bottom: 18px; 
            box-sizing: border-box; 
        }
        .brand { font-weight: bold; color: var(--accent-blue); font-size: 1.1rem; }
        .profile-badge { background: var(--accent-blue); color: white; padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; }
        .profile-badge:hover { background: #2563eb; }
        
        .box-card { 
            background: var(--bg-card); 
            padding: 2.2rem; 
            border-radius: 24px; 
            border: 1px solid var(--border-color); 
            margin-bottom: 18px; 
            text-align: left; 
            box-sizing: border-box;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4); 
        }
        
        h2 { color: var(--accent-blue); margin-top: 0; font-size: 1.3rem; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
        
        .report-text { 
            font-size: 0.95rem; 
            line-height: 1.5; 
            color: #f1f5f9; 
            margin: 0; 
        }

        .investment-value { 
            font-size: 2.5rem; 
            font-weight: 800; 
            color: var(--accent-emerald); 
            margin-bottom: 6px; 
        }
        
        .progress-track { 
            background: var(--bg-main); 
            height: 10px; 
            border-radius: 10px; 
            overflow: hidden; 
            border: 1px solid var(--border-color); 
            margin-top: 12px; 
        }
        .progress-bar { 
            background: var(--accent-emerald); 
            height: 100%; 
            width: 0%; 
            transition: width 0.6s ease; 
        }

        .nav-dock { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); border: 1px solid var(--border-color); display: flex; padding: 8px; width: 440px; border-radius: 16px; box-sizing: border-box; z-index: 100; }
        .nav-dock button { flex: 1; margin: 0 4px; padding: 12px; background: transparent; border: none; border-radius: 10px; color: var(--text-muted); font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.2s ease; }
        .nav-dock button:hover { color: var(--text-main); background: rgba(255, 255, 255, 0.05); }
        .nav-dock .active { background: var(--accent-blue); color: white !important; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <div class="brand">InvestoMicro</div>
            <button class="profile-badge" onclick="location.href='profile.html'">👤 Profile</button>
        </div>

        <div class="box-card">
            <h2>💰 End-Of-Day Safe Investment</h2>
            <div class="investment-value" id="invest-amount-display">₹0.00</div>
            <p class="report-text" id="invest-analysis-text">Analyzing your secure cash reserves...</p>
            <div class="progress-track">
                <div class="progress-bar" id="invest-bar"></div>
            </div>
        </div>

        <div class="box-card">
            <h2>📊 Ledger Allocation Summary</h2>
            <div id="distribution-container">
                <p class="report-text" style="color: var(--text-muted);">Syncing spending patterns...</p>
            </div>
        </div>
    </div>

    <div class="nav-dock">
        <button onclick="location.href='input.html'">Input</button>
        <button onclick="location.href='ai.html'">AI Analysis</button>
        <button onclick="location.href='patterns.html'">Patterns</button>
        <button class="active" onclick="location.href='suggest.html'">Suggestions</button>
    </div>

    <script>
        const S_URL = 'https://funcvigewkhauenqxrbf.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1bmN2aWdld2toYXVlbnF4cmJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NTM1MzQsImV4cCI6MjA5NDEyOTUzNH0.INR7nkrv-CV80i97SyaHwdZd3chlQjaVgNsQY39Nqxo';
        const _supabase = supabase.createClient(S_URL, S_KEY);

        async function verifyAuthenticationState() {
            try {
                const { data } = await _supabase.auth.getSession();
                if (!data || !data.session) {
                    window.location.href = 'index.html';
                } else {
                    processDashboardInsights(data.session.user.id);
                }
            } catch (err) {
                window.location.href = 'index.html';
            }
        }
        window.onload = verifyAuthenticationState;

        async function processDashboardInsights(userId) {
            try {
                // FIXED: Target 'spends' table instead of 'expenses'
                let { data: rows, error } = await _supabase
                    .from('spends')
                    .select('*')
                    .eq('user_id', userId);
                
                if (error) throw error;

                const distContainer = document.getElementById('distribution-container');

                if (!rows || rows.length === 0) {
                    distContainer.innerHTML = `<p class="report-text" style="color:var(--text-muted);">No entries recorded. Add items inside the input screen to review recommendations.</p>`;
                    document.getElementById('invest-amount-display').innerText = "₹15.00";
                    document.getElementById('invest-bar').style.width = "30%";
                    document.getElementById('invest-analysis-text').innerText = "Invest ₹15.00. This is a baseline safe calculation to help build active liquidity while protecting your daily pipeline balances.";
                    return;
                }

                let totalEssential = 0;
                let totalUnnecessary = 0;
                let totalAmount = 0;

                rows.forEach(r => {
                    const cat = (r.category || "").toLowerCase();
                    const amt = Number(r.amount) || 0;
                    totalAmount += amt;

                    // Support matching both tracking variations across tables smoothly
                    if (cat.includes("unnecessary")) {
                        totalUnnecessary += amt;
                    } else {
                        totalEssential += amt;
                    }
                });

                // --- DYNAMIC RUPEE MATHEMATICAL INVESTMENT ALLOCATION FORMULA ---
                // Changes values completely dynamically including decimals based on structural metrics
                let calculatedInvestment = 0;
                
                if (totalAmount > 0) {
                    const leakFactor = totalUnnecessary / totalAmount;
                    // Creates an organic floating calculation variant capped under a ceiling rate
                    calculatedInvestment = (leakFactor * 35) + (totalAmount * 0.02) + 5;
                } else {
                    calculatedInvestment = 15.50; 
                }

                // Clamps investment ceiling logic safely between 0 and 100
                if (calculatedInvestment > 100) calculatedInvestment = 100;
                if (calculatedInvestment < 0) calculatedInvestment = 0;

                // Format to exactly two decimal structures dynamically
                const formattedInvestment = calculatedInvestment.toFixed(2);

                // Update text view wrappers
                document.getElementById('invest-amount-display').innerText = `₹${formattedInvestment}`;
                document.getElementById('invest-bar').style.width = `${Math.min((calculatedInvestment / 100) * 100, 100)}%`;
                
                document.getElementById('invest-analysis-text').innerText = 
                    `Invest ₹${formattedInvestment}. This end-of-day target balances your savings pipeline without tying up the residual cash required for your upcoming short-term liabilities.`;

                distContainer.innerHTML = `
                    <p class="report-text">
                        Your structural layout shows <b>₹${totalEssential.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</b> routed to essential commitments, and 
                        <b>₹${totalUnnecessary.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</b> tied to non-utility items. Restructuring these minor components helps lock down consistent safety reserves.
                    </p>
                `;

            } catch (err) {
                console.error("Suggestions calculations pipeline execution error:", err);
            }
        }
    </script>
</body>
</html>
