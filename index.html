<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroInvest Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #0f172a; color: white; margin: 0; }
        .box { background: #1e293b; padding: 30px; border-radius: 20px; width: 300px; text-align: center; border: 1px solid #334155; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .toggle { margin-top: 15px; font-size: 0.8rem; color: #94a3b8; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2 id="title">Sign In</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button id="authBtn">Go</button>
        <div class="toggle" id="toggleLink">Need an account? Sign Up</div>
    </div>

    <script>
        // 2. FILL THESE TWO LINES FROM YOUR DASHBOARD
        const S_URL = 'https://funcvigewkhauenqxrbf.supabase.co'; 
        const S_KEY = 'PASTE_YOUR_ANON_PUBLISHABLE_KEY_HERE'; 

        const _supabase = supabase.createClient(S_URL, S_KEY);
        let isLoginMode = true;

        // Toggle UI between Login and Sign Up
        document.getElementById('toggleLink').onclick = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('title').innerText = isLoginMode ? "Sign In" : "Sign Up";
            document.getElementById('toggleLink').innerText = isLoginMode ? "Need an account? Sign Up" : "Have an account? Sign In";
        };

        // Main Action
        document.getElementById('authBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (isLoginMode) {
                const { error } = await _supabase.auth.signInWithPassword({ email, password });
                if (error) alert(error.message);
                else window.location.href = 'input.html'; // Goes to your analysis page
            } else {
                const { error } = await _supabase.auth.signUp({ email, password });
                if (error) alert(error.message);
                else alert("Check your email to confirm!");
            }
        };
    </script>
</body>
</html>
