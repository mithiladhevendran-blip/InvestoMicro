<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patterns - InvestoMicro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; margin:0; padding:20px; }
        .card { background:#1e293b; padding:20px; border-radius:20px; margin-bottom:20px; border:1px solid #334155; }
        button { padding:12px; margin:5px; border:none; border-radius:10px; cursor:pointer; }
        .delete-btn { background:#ef4444; color:white; }
        .nav { position:fixed; bottom:0; left:0; right:0; background:#1e293b; border-top:1px solid #334155; display:flex; padding:10px; }
        .nav button { flex:1; margin:0 5px; padding:14px; background:#334155; border-radius:12px; color:white; }
    </style>
</head>
<body>
    <h2 style="text-align:center;">Your Spending Patterns</h2>
    <div class="card">
        <canvas id="pieChart" height="200"></canvas>
    </div>

    <div class="card">
        <h3>Recent Transactions</h3>
        <div id="transactions"></div>
    </div>

    <div class="nav">
        <button onclick="location.href='ai.html'">AI Analysis</button>
        <button onclick="location.href='patterns.html'">Patterns</button>
        <button onclick="location.href='suggest.html'">Suggestions</button>
    </div>

<script type="module">
    const _supabase = supabase.createClient(
        'https://funcvigewkhauenqxrbf.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1bmN2aWdld2toYXVlbnF4cmJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NTM1MzQsImV4cCI6MjA5NDEyOTUzNH0.INR7nkrv-CV80i97SyaHwdZd3chlQjaVgNsQY39Nqxo'
    );

    let chart;

    async function loadData() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (!user) return alert("Please login");

        const { data: spends } = await _supabase
            .from('spends')
            .select('*')
            .eq('user_id', user.id)
            .order('created_at', { ascending: false });

        renderTransactions(spends);
        renderPieChart(spends);
    }

    function renderTransactions(data) {
        const container = document.getElementById('transactions');
        container.innerHTML = '';

        data.forEach(item => {
            const div = document.createElement('div');
            div.style.cssText = 'background:#334155; padding:15px; margin:10px 0; border-radius:12px; display:flex; justify-content:space-between; align-items:center;';
            div.innerHTML = `
                <div>
                    <strong>₹${item.amount}</strong> - ${item.category}<br>
                    <small>${item.description}</small>
                </div>
                <button class="delete-btn" onclick="deleteEntry('${item.id}')">Delete</button>
            `;
            container.appendChild(div);
        });
    }

    async function deleteEntry(id) {
        if (!confirm("Delete this entry?")) return;
        await _supabase.from('spends').delete().eq('id', id);
        loadData();   // Refresh
    }

    function renderPieChart(data) {
        const ctx = document.getElementById('pieChart');
        const categoryTotal = {};

        data.forEach(item => {
            const cat = item.category || "Other";
            categoryTotal[cat] = (categoryTotal[cat] || 0) + parseFloat(item.amount || 0);
        });

        if (chart) chart.destroy();

        chart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: Object.keys(categoryTotal),
                datasets: [{
                    data: Object.values(categoryTotal),
                    backgroundColor: ['#3b82f6', '#22c55e', '#eab308', '#ef4444', '#a855f7']
                }]
            },
            options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
        });
    }

    loadData();
</script>
</body>
</html>
