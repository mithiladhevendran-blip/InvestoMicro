<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Result - InvestoMicro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; padding: 40px; max-width: 500px; margin: auto; text-align: center; background: #0f172a; color: white; display: flex; align-items: center; min-height: 100vh; }
        .card { padding: 30px; border-radius: 24px; background: #1e293b; border: 1px solid #334155; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h3 { color: #60a5fa; font-size: 1.6rem; margin: 20px 0; letter-spacing: -0.5px; }
        .desc { color: #94a3b8; line-height: 1.5; margin-bottom: 30px; min-height: 50px; }
        button { padding: 16px; background: #3b82f6; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; }
        button:hover { background: #2563eb; transform: translateY(-2px); }
        .status { font-size: 0.7rem; color: #475569; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: #94a3b8; font-size: 1rem; text-transform: uppercase; letter-spacing: 2px;">AI Analysis</h2>
        <h3 id="cat">Processing...</h3>
        <p id="desc" class="desc"></p>
        <button id="saveBtn" onclick="saveToCloud()">Confirm & Save to Cloud</button>
        <p id="saveStatus" class="status"></p>
    </div>

    <script>
        // Use your specific keys
        const S_URL = 'https://funcvigewkhauenqxrbf.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1bmN2aWdld2toYXVlbnF4cmJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NTM1MzQsImV4cCI6MjA5NDEyOTUzNH0.INR7nkrv-CV80i97SyaHwdZd3chlQjaVgNsQY39Nqxo';
        const _supabase = supabase.createClient(S_URL, S_KEY);

        const sms = (localStorage.getItem('lastSMS') || "").toLowerCase();
        let cat = "Long Term / Not Necessary";
        let desc = "Discretionary purchase or non-essential item.";

        // Your logic
        if (sms.includes('dog') || sms.includes('glucose') || sms.includes('pen') || sms.includes('emergency')) {
            cat = "Short Term / Important";
            desc = "Urgent necessities, food, or basic daily tools.";
        } else if (sms.includes('movie') || sms.includes('snack') || sms.includes('chips') || sms.includes('burger')) {
            cat = "Short Term / Not Necessary";
            desc = "Instant cravings or entertainment.";
        } else if (sms.includes('arduino') || sms.includes('med') || sms.includes('book')) {
            cat = "Long Term / Necessary";
            desc = "Investment in learning, health, or durable utility.";
        }

        document.getElementById('cat').innerText = cat;
        document.getElementById('desc').innerText = desc;

        async function saveToCloud() {
            const btn = document.getElementById('saveBtn');
            const status = document.getElementById('saveStatus');
            btn.innerText = "Saving...";
            btn.disabled = true;

            // Get current user ID
            const { data: { user } } = await _supabase.auth.getUser();

            if (user) {
                const { error } = await _supabase
                    .from('spends') // Ensure you created this table in Supabase!
                    .insert([{ 
                        user_id: user.id, 
                        category: cat, 
                        description: sms,
                        created_at: new Date()
                    }]);

                if (error) {
                    alert("Database Error: " + error.message);
                    btn.disabled = false;
                    btn.innerText = "Try Again";
                } else {
                    window.location.href = 'patterns.html';
                }
            } else {
                alert("Please log in first!");
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
