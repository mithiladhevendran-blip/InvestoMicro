<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvestoMicro Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #0f172a; margin: 0; color: white; }
        .box { background: #1e293b; padding: 2rem; border-radius: 20px; width: 320px; text-align: center; border: 1px solid #334155; }
        h2 { color: #3b82f6; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .toggle { margin-top: 15px; font-size: 0.8rem; color: #94a3b8; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="box">
        <h2 id="title">Sign In</h2>
        <input type="email" id="email" placeholder="Email (e.g. name@mail.com)">
        <input type="password" id="password" placeholder="Password">
        <button id="authBtn">Enter App</button>
        <div class="toggle" id="toggleLink">Need an account? Sign Up</div>
    </div>

    <script>
        // 2. These match your project: funcvigewkhauenqxrbf
        const S_URL = 'https://funcvigewkhauenqxrbf.supabase.co';
        const S_KEY = 'sb_publishable_lviXZq083JXjjZu6q9BPVA_AAIRSRE6i6GfQ2e0n7M8lDMTtKIsK1YwZ0Yp5fDqfK0uT';

        const _supabase = supabase.createClient(S_URL, S_KEY);
        let isLoginMode = true;

        // Toggle UI
        document.getElementById('toggleLink').onclick = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('title').innerText = isLoginMode ? "Sign In" : "Sign Up";
            document.getElementById('toggleLink').innerText = isLoginMode ? "Need an account? Sign Up" : "Have an account? Sign In";
        };

        // Handle Auth
        document.getElementById('authBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email.includes('@')) return alert("Please use a valid email format.");

            if (isLoginMode) {
                const { error } = await _supabase.auth.signInWithPassword({ email, password });
                if (error) alert(error.message);
                else window.location.href = 'input.html';
            } else {
                const { error } = await _supabase.auth.signUp({ email, password });
                if (error) alert(error.message);
                else alert("Success! Check your email for a confirmation link.");
            }
        };
    </script>
</body>
</html>
