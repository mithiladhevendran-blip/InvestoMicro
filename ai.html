<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Result - InvestoMicro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            padding: 20px; 
            max-width: 520px; 
            margin: auto; 
            background: #0f172a; 
            color: white; 
            min-height: 100vh; 
        }
        .card { 
            padding: 30px; 
            border-radius: 24px; 
            background: #1e293b; 
            border: 1px solid #334155; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        h3 { color: #60a5fa; font-size: 1.55rem; margin: 20px 0; }
        .desc { color: #94a3b8; line-height: 1.6; margin: 20px 0; min-height: 90px; }
        
        button { 
            padding: 16px; 
            background: #3b82f6; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%; 
            margin: 8px 0;
        }
        button:hover:not(:disabled) { background: #2563eb; transform: translateY(-2px); }
        button:disabled { background: #475569; }

        .nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1e293b;
            border-top: 1px solid #334155;
            display: flex;
            padding: 10px 0;
            max-width: 520px;
            margin: 0 auto;
        }
        .nav button {
            flex: 1;
            margin: 0 5px;
            padding: 12px;
            font-size: 0.9rem;
            background: #334155;
        }
        .nav button.active {
            background: #3b82f6;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: #94a3b8; font-size: 1rem; text-transform: uppercase; letter-spacing: 2px;">AI Spend Analysis</h2>
        <h3 id="cat">Analyzing with Gemini...</h3>
        <p id="desc" class="desc"></p>
        
        <button id="saveBtn">Confirm & Save ₹0</button>
        <button id="skipBtn" style="background:#475569;">Skip & View Patterns</button>
    </div>

    <!-- Bottom Navigation -->
    <div class="nav">
        <button onclick="goTo('ai.html')">AI Analysis</button>
        <button onclick="goTo('patterns.html')">Patterns</button>
        <button onclick="goTo('suggestions.html')">Suggestions</button>
    </div>

<script type="module">
    const GEMINI_API_KEY = "YOUR_GEMINI_API_KEY_HERE";   // ←←← PUT YOUR KEY HERE

    const _supabase = supabase.createClient(
        'https://funcvigewkhauenqxrbf.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1bmN2aWdld2toYXVlbnF4cmJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NTM1MzQsImV4cCI6MjA5NDEyOTUzNH0.INR7nkrv-CV80i97SyaHwdZd3chlQjaVgNsQY39Nqxo'
    );

    const sms = (localStorage.getItem('lastSMS') || "").trim();
    let finalCategory = "Short Term Not Necessary";
    let finalAmount = 0;

    function extractAmount(text) {
        const regex = /(?:₹|Rs\.?|INR)?\s*(\d{1,3}(?:,\d{3})*|\d+)(?:\.\d{1,2})?/gi;
        let match, max = 0;
        while ((match = regex.exec(text)) !== null) {
            const num = parseFloat(match[1].replace(/,/g, ''));
            if (num > max) max = num;
        }
        return max;
    }

    finalAmount = extractAmount(sms);

    async function runAnalysis() {
        document.getElementById('saveBtn').disabled = true;
        document.getElementById('cat').innerText = "Gemini Analyzing...";

        try {
            const prompt = `Classify this expense into ONE category only.\nMessage: "${sms}"\nAmount: ₹${finalAmount}\n\nCategories:\n- Long Term Necessary\n- Short Term Important\n- Short Term Not Necessary\n- Long Term Not Necessary\n\nReply strictly in this format:\nCategory: [category name]\nReason: [short reason]`;

            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await res.json();
            const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";

            const lowerText = text.toLowerCase();
            if (lowerText.includes("long term necessary")) finalCategory = "Long Term Necessary";
            else if (lowerText.includes("short term important")) finalCategory = "Short Term Important";
            else if (lowerText.includes("long term not necessary")) finalCategory = "Long Term Not Necessary";
            else finalCategory = "Short Term Not Necessary";

            document.getElementById('desc').innerHTML = `<strong>${finalCategory}</strong><br><small>${text}</small>`;

        } catch (e) {
            console.log("Gemini failed, using rules");
            finalCategory = /fence|buffalo|farm|school|college|fee|textbook|medical|rent|emi|loan/i.test(sms.toLowerCase()) 
                ? "Long Term Necessary" 
                : "Short Term Not Necessary";
            document.getElementById('desc').innerText = "Using smart rules (offline)";
        }

        document.getElementById('cat').innerText = finalCategory;
        document.getElementById('saveBtn').innerText = `Confirm & Save ₹${finalAmount}`;
        document.getElementById('saveBtn').disabled = false;
    }

    window.saveToCloud = async () => {
        const btn = document.getElementById('saveBtn');
        btn.innerText = "Saving...";
        btn.disabled = true;

        try {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) return alert("Please login first");

            await _supabase.from('spends').insert([{
                user_id: user.id,
                category: finalCategory,
                description: sms,
                amount: finalAmount,
                created_at: new Date().toISOString()
            }]);

            alert("Saved successfully!");
            window.location.href = 'patterns.html';
        } catch (err) {
            alert("Save failed. Try again.");
        }
    };

    // Navigation Helper
    function goTo(page) {
        window.location.href = page;
    }

    document.getElementById('skipBtn').onclick = () => goTo('patterns.html');

    // Start Analysis
    if (sms) {
        runAnalysis();
    } else {
        document.getElementById('cat').innerText = "No SMS Found";
        document.getElementById('desc').innerText = "Please go back and select an SMS.";
    }
</script>
</body>
</html>
