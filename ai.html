<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Result - InvestoMicro</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            padding: 40px; 
            max-width: 500px; 
            margin: auto; 
            text-align: center; 
            background: #0f172a; 
            color: white; 
        }
        .card { 
            padding: 30px; 
            border-radius: 20px; 
            background: #1e293b; 
            border: 1px solid #334155; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        h2 { color: #94a3b8; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; margin-top: 0; }
        h3 { color: #60a5fa; font-size: 1.6rem; margin: 15px 0 5px 0; }
        .desc { color: #94a3b8; line-height: 1.5; font-size: 0.95rem; margin-bottom: 25px; }
        
        /* Context Input Styling */
        .refinement-area {
            border-top: 1px solid #334155;
            padding-top: 20px;
            margin-top: 20px;
            text-align: left;
        }
        .refinement-area label {
            color: #94a3b8;
            font-size: 0.85rem;
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .refinement-area textarea {
            width: 100%;
            box-sizing: border-box;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 12px;
            color: white;
            font-family: inherit;
            font-size: 0.9rem;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }
        .refinement-area textarea:focus {
            border-color: #3b82f6;
        }

        /* Button Groups */
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }
        button { 
            padding: 14px 20px; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 0.95rem;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        .btn-back {
            background: #334155;
            width: 35%;
        }
        .btn-confirm { 
            background: #10b981; /* Green accent matching your primary CTA */
            width: 65%;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>AI Classification Result</h2>
        <h3 id="cat">Classifying...</h3>
        <p id="desc" class="desc"></p>
        
        <!-- Contextual Refinement Box -->
        <div class="refinement-area">
            <label for="contextInput">Finer Classification (Optional)</label>
            <textarea id="contextInput" rows="2" placeholder="Describe why you bought this... (e.g., 'it was a gift', 'for my farm fence', 'business investment')" oninput="refineClassification()"></textarea>
        </div>

        <!-- Navigation Buttons -->
        <div class="btn-group">
            <button class="btn-back" onclick="goToInputPage()">← Back</button>
            <button class="btn-confirm" onclick="saveAndProceed()">Confirm & Save</button>
        </div>
    </div>

    <script>
        // Extract raw string from previous page
        const rawSMS = (localStorage.getItem('lastSMS') || "").toLowerCase();
        
        // Setup initial classifications
        let finalizedCat = "Unnecessary and Long term";
        let finalizedDesc = "Discretionary purchase, leisure items, or non-essential hardware.";

        // 1. Initial Local Keyword Scan (Whole-word checking logic)
        function checkInitialKeywords(text) {
            const clean = text.toLowerCase();
            
            // Check for strict word boundaries to keep "buffalo" from breaking rules
            const hasWord = (word) => new RegExp('\\b' + word + '\\b').test(clean);

            if (hasWord('dog') || hasWord('glucose') || hasWord('pen') || hasWord('emergency') || hasWord('medicine') || hasWord('med') || hasWord('food')) {
                finalizedCat = "Necessary and Immediate/Short term";
                finalizedDesc = "Urgent necessities, healthcare items, food, or vital daily tools.";
            } else if (hasWord('movie') || hasWord('snack') || hasWord('chips') || hasWord('burger') || hasWord('craving') || hasWord('pizza')) {
                finalizedCat = "Unnecessary and Short term";
                finalizedDesc = "Instant comfort purchases, snacks, or temporary entertainment.";
            } else if (hasWord('arduino') || hasWord('book') || hasWord('course') || hasWord('insurance')) {
                finalizedCat = "Necessary and Long term";
                finalizedDesc = "Long-term infrastructure assets, core education, or durable utility investments.";
            }
            
            updateUI();
        }

        // 2. Context-Aware Dynamic Override Logic
        function refineClassification() {
            const context = document.getElementById('contextInput').value.toLowerCase();
            const hasContextWord = (word) => new RegExp('\\b' + word + '\\b').test(context);

            // Run initial check first to establish baseline
            checkInitialKeywords(rawSMS);

            // RULE A: Gift Precedence
            if (hasContextWord('gift') || hasContextWord('present') || hasContextWord('birthday')) {
                finalizedCat = "Necessary and Immediate/Short term";
                finalizedDesc = "Classified based on contextual override: Items tagged as gifts are prioritized as essential short-term gestures.";
            }
            // RULE B: Industrial/Asset/Property Defense Protection (e.g., Buffalo Fencing)
            else if (hasContextWord('farm') || hasContextWord('fence') || hasContextWord('fencing') || hasContextWord('asset') || hasContextWord('security') || hasContextWord('work')) {
                finalizedCat = "Necessary and Long term";
                finalizedDesc = "Context refined: Tracked as core property maintenance, security defenses, or long-term operational infrastructure.";
            }
            // RULE C: Health/Survival Context
            else if (hasContextWord('sick') || hasContextWord('doctor') || hasContextWord('health')) {
                finalizedCat = "Necessary and Immediate/Short term";
                finalizedDesc = "Context refined: Re-evaluated as an immediate healthcare or survival preservation expense.";
            }

            updateUI();
        }

        function updateUI() {
            document.getElementById('cat').innerText = finalizedCat;
            document.getElementById('desc').innerText = finalizedDesc;
        }

        // Return to input.html without breaking history data states
        function goToInputPage() {
            window.location.href = 'input.html';
        }

        // Save data to localStorage arrays and advance to patterns page
        function saveAndProceed() {
            let history = JSON.parse(localStorage.getItem('spendHistory') || '[]');
            history.push({
                cat: finalizedCat, 
                desc: finalizedDesc,
                rawInput: rawSMS,
                contextGiven: document.getElementById('contextInput').value,
                date: new Date().toLocaleDateString()
            });
            localStorage.setItem('spendHistory', JSON.stringify(history));
            window.location.href = 'patterns.html';
        }

        // Run the script on initial page frame load
        checkInitialKeywords(rawSMS);
    </script>
</body>
</html>
