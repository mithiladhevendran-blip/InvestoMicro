<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Advice - InvestoMicro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; padding: 20px; text-align: center; }
        .advice-card { background: #1e293b; padding: 30px; border-radius: 24px; max-width: 500px; margin: auto; border: 1px solid #334155; }
        .stat-circle { font-size: 3rem; font-weight: 800; color: #3b82f6; margin: 20px 0; }
        .message { color: #94a3b8; line-height: 1.6; }
        .btn-back { margin-top: 20px; background: none; border: 1px solid #334155; color: #94a3b8; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="advice-card">
        <h2 id="advice-title">Analyzing Your Habits...</h2>
        <div id="percentage" class="stat-circle">0%</div>
        <p id="advice-text" class="message">Fetching your latest financial data...</p>
        
        <button class="btn-back" onclick="window.location.href='patterns.html'">Back to Dashboard</button>
    </div>

    <script>
    const S_URL = 'https://funcvigewkhauenqxrbf.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1bmN2aWdld2toYXVlbnF4cmJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NTM1MzQsImV4cCI6MjA5NDEyOTUzNH0.INR7nkrv-CV80i97SyaHwdZd3chlQjaVgNsQY39Nqxo';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    async function generateAdvice() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (!user) return;

        // Fetch all spending for this user
        const { data } = await _supabase.from('spends').select('*');

        if (data && data.length > 0) {
            let totalWaste = 0; // Sum of Short Term / Not Necessary
            let totalNecessary = 0;

            data.forEach(item => {
                const amt = parseFloat(item.amount) || 0;
                if (item.category.includes('Not Necessary')) {
                    totalWaste += amt;
                } else {
                    totalNecessary += amt;
                }
            });

            // Update the big number to show Rupees
            const displayValue = document.getElementById('percentage');
            displayValue.innerText = "₹" + totalWaste.toLocaleString('en-IN');
            
            const title = document.getElementById('advice-title');
            const text = document.getElementById('advice-text');

            // Logic based on total Rupees wasted
            if (totalWaste > 5000) {
                title.innerText = "Heavy Leakage Found";
                title.style.color = "#ef4444";
                text.innerText = `You have spent ₹${totalWaste} on non-essentials. If you invested this in a Nifty 50 Index Fund, it could grow significantly. Start a SIP today!`;
            } else if (totalWaste > 0) {
                title.innerText = "Minor Leaks";
                title.style.color = "#f59e0b";
                text.innerText = `You've spent ₹${totalWaste} on cravings. Try to cut this by 50% next month and put the rest into a digital gold vault.`;
            } else {
                title.innerText = "Perfect Discipline";
                title.style.color = "#10b981";
                text.innerText = "You haven't wasted a single Rupee! You are ready to explore high-yield investment options.";
            }
        } else {
            document.getElementById('advice-text').innerText = "No data found. Start by adding your expenses!";
        }
    }

    generateAdvice();
</script>
</body>
</html>
