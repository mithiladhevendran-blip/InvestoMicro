<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvestoMicro v2.0</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #0f172a; margin: 0; color: white; }
        .box { background: #1e293b; padding: 2rem; border-radius: 24px; width: 320px; text-align: center; border: 1px solid #334155; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; outline: none; }
        input:focus { border-color: #3b82f6; }
        
        /* Security mask trick: Hides characters as dots visually but keeps type as text to fool Samsung Pass */
        .mask-password { -webkit-text-security: disc; text-security: disc; }
        
        .btn-login { width: 100%; padding: 14px; background: #3b82f6; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 15px; }
        .btn-signup { width: 100%; padding: 12px; background: transparent; color: #94a3b8; border: 1px solid #334155; border-radius: 12px; cursor: pointer; margin-top: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="box">
        <h2>InvestoMicro</h2>
        <!-- Standard text formats hide the input fields from Samsung's Autofill scanner -->
        <input type="text" id="email" placeholder="Email" autocomplete="off" name="sh-email">
        <input type="text" id="password" class="mask-password" placeholder="Password" autocomplete="off" name="sh-pass">
        
        <button class="btn-login" onclick="handleLogin()">Sign In</button>
        <button class="btn-signup" onclick="handleSignUp()">Create New Account</button>
    </div>

    <script>
        // ⚡ FIXED: Restored your active instance endpoints securely
        const S_URL = 'https://funcvigewkhauenqxrbf.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1bmN2aWdld2toYXVlbnF4cmJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NTM1MzQsImV4cCI6MjA5NDEyOTUzNH0.INR7nkrv-CV80i97SyaHwdZd3chlQjaVgNsQY39Nqxo';
        
        const _supabase = supabase.createClient(S_URL, S_KEY, {
            auth: {
                persistSession: true,
                autoRefreshToken: true,
                detectSessionInUrl: false
            }
        });

        // Instant redirect bypass if token storage payload exists
        async function checkSession() {
            try {
                const { data } = await _supabase.auth.getSession();
                if (data?.session) {
                    window.location.href = 'input.html';
                }
            } catch(e) {
                console.error("Session scan failed");
            }
        }
        checkSession();

        // Standard Password Sign In
        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if(!email || !password) return alert("Please fill out all fields.");
            
            const { data, error } = await _supabase.auth.signInWithPassword({ 
                email: email.trim(), 
                password: password 
            });
            
            if (error) {
                alert("Login error: " + error.message);
            } else if (data?.session) {
                window.location.href = 'input.html';
            }
        }

        // Standard Signup
        async function handleSignUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if(!email || !password) return alert("Please fill out all fields.");

            const { error } = await _supabase.auth.signUp({
                email: email.trim(),
                password: password,
                options: {
                    emailRedirectTo: 'https://github.io'
                }
            });

            if (error) {
                alert("Signup error: " + error.message);
            } else {
                alert("Account verification link sent to your email!");
            }
        }
    </script>
</body>
</html>
