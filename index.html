<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroInvest Login</title>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #0f172a; margin: 0; color: #f8fafc; }
        .box { background: #1e293b; padding: 2.5rem; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); width: 350px; text-align: center; border: 1px solid #334155; }
        h2 { margin-bottom: 0.5rem; color: #3b82f6; letter-spacing: -1px; }
        p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 2rem; }
        input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #334155; border-radius: 12px; box-sizing: border-box; background: #0f172a; color: white; outline: none; }
        input:focus { border-color: #3b82f6; }
        button { width: 100%; padding: 14px; background: #3b82f6; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 1.5rem; transition: 0.3s; }
        button:hover { background: #2563eb; transform: translateY(-2px); }
        .toggle-text { margin-top: 1.5rem; font-size: 0.85rem; color: #94a3b8; }
        .toggle-text span { color: #3b82f6; cursor: pointer; font-weight: 600; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="box">
        <h2 id="title">Welcome Back</h2>
        <p id="subtitle">Enter your details to sign in</p>
        
        <input type="tel" placeholder="Phone Number">
        <input type="password" placeholder="Password">
        
        <button onclick="window.location.href='input.html'" id="mainBtn">Sign In</button>
        
        <div class="toggle-text" id="toggleArea">
            Don't have an account? <span onclick="toggleAuth()">Sign Up</span>
        </div>
    </div>

   <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // 2. Your project details from Supabase settings
        const S_URL = 'https://funcvigewkhauenqxrbf.supabase.co'; 
        const S_KEY = 'sb_publishable_lviXZq083JXjjZu6q9BPVA_AAIRS...'; // Use the full key from your dashboard

        const _supabase = supabase.createClient(S_URL, S_KEY);
        let isLogin = true;

        // Visual toggle for Sign In / Sign Up
        function toggleAuth() {
            isLogin = !isLogin;
            const title = document.getElementById('title');
            const subtitle = document.getElementById('subtitle');
            const mainBtn = document.getElementById('mainBtn');
            const toggleArea = document.getElementById('toggleArea');

            if (isLogin) {
                title.innerText = "Welcome Back";
                subtitle.innerText = "Enter your details to sign in";
                mainBtn.innerText = "Sign In";
                toggleArea.innerHTML = `Don't have an account? <span onclick="toggleAuth()">Sign Up</span>`;
            } else {
                title.innerText = "Create Account";
                subtitle.innerText = "Join MicroInvest to track spending";
                mainBtn.innerText = "Sign Up";
                toggleArea.innerHTML = `Already have an account? <span onclick="toggleAuth()">Sign In</span>`;
            }
        }

        // 3. The actual logic to talk to your database
        async function handleAuth() {
            // Find your email and password inputs
            const email = document.querySelector('input[type="tel"]').value; 
            const password = document.querySelector('input[type="password"]').value;

            if (isLogin) {
                const { error } = await _supabase.auth.signInWithPassword({ email, password });
                if (error) alert(error.message);
                else window.location.href = 'input.html';
            } else {
                const { error } = await _supabase.auth.signUp({ email, password });
                if (error) alert(error.message);
                else alert("Success! Check your email for a confirmation link.");
            }
        }

        // Connect the button to the function above
        document.getElementById('mainBtn').onclick = handleAuth;
    </script>
</body>
</html>
</body>
</html>
