<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvestoMicro - Local Expense Classifier</title>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f9fafb;
            --card-bg: #ffffff;
            --text: #111827;
            --border: #e5e7eb;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        h2 { margin-top: 0; color: var(--primary); }
        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        textarea {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 15px;
            outline: none;
            resize: vertical;
        }
        textarea:focus { border-color: var(--primary); }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            border-left: 5px solid #d1d5db;
            background: #f3f4f6;
            display: none;
        }
        .result-box.active { display: block; }
        .category-tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        /* Dynamic Category Accent Colors */
        .cat-1 { background: #dcfce7; color: #166534; border-left-color: #22c55e !important; }
        .cat-2 { background: #dbeafe; color: #1e40af; border-left-color: #3b82f6 !important; }
        .cat-3 { background: #fef3c7; color: #92400e; border-left-color: #f59e0b !important; }
        .cat-4 { background: #fee2e2; color: #991b1b; border-left-color: #ef4444 !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>InvestoMicro Expense Classifier</h2>

    <div class="form-group">
        <label for="expenseInput">What did you spend money on?</label>
        <textarea id="expenseInput" rows="4" placeholder="Type your expense here... (e.g., medical checkup, pizza craving, birthday gift, buying an extra game controller)"></textarea>
    </div>

    <button onclick="classifyExpenseLocal()">Classify Expense</button>

    <div id="resultBox" class="result-box">
        <div id="categoryTag" class="category-tag">Category</div>
        <div style="font-weight: 600; font-size: 18px; margin-bottom: 8px;" id="resCategoryName"></div>
        <p id="resReasoning" style="margin: 0; line-height: 1.5; color: #4b5563; font-size: 14px;"></p>
    </div>
</div>

<script>
function classifyExpenseLocal() {
    const text = document.getElementById('expenseInput').value.trim();
    const resultBox = document.getElementById('resultBox');
    
    if (!text) { alert('Please enter an expense description.'); return; }

    const cleanText = text.toLowerCase();
    let categoryId = 3; // Default fallback to Unnecessary Short-term if vague
    let reason = "";

    // --- RULE 1: STRICT GIFT OVERRIDE ---
    if (cleanText.includes('gift') || cleanText.includes('present') || cleanText.includes('birthday')) {
        categoryId = 1;
        reason = "Classified based on rule: Items tagged as gifts are forced as Necessary and Immediate/Short term.";
    } else {
        // --- RULE 2: ADVANCED LOCAL SCANNING MATRICES ---
        
        // Category 1 Matrices
        const cat1Keywords = ['rent', 'food', 'groceries', 'bill', 'electricity', 'water', 'medical', 'doctor', 'medicine', 'hospital', 'repair', 'fix', 'fuel', 'petrol', 'diesel', 'cab', 'uber', 'transport', 'ticket'];
        
        // Category 2 Matrices
        const cat2Keywords = ['insurance', 'tax', 'tuition', 'fee', 'college', 'school', 'house', 'home loan', 'emi', 'investment', 'gold', 'savings', 'retirement', 'annual', 'yearly', 'subscription premium'];
        
        // Category 3 Matrices
        const cat3Keywords = ['snack', 'craving', 'chocolate', 'starbucks', 'coffee', 'ice cream', 'pizza', 'burger', 'swiggy', 'zomato', 'pub', 'beer', 'drink', 'movie', 'cinema', 'uber premier'];
        
        // Category 4 Matrices
        const cat4Keywords = ['toy', 'gadget', 'ps5', 'xbox', 'console', 'game', 'watch', 'luxury', 'sneakers', 'collectible', 'skin', 'crypto', 'nft', 'jewelry', 'diamond', 'statue', 'action figure'];

        // Compute scores based on occurrences
        let score1 = cat1Keywords.reduce((acc, word) => acc + (cleanText.includes(word) ? 1 : 0), 0);
        let score2 = cat2Keywords.reduce((acc, word) => acc + (cleanText.includes(word) ? 1 : 0), 0);
        let score3 = cat3Keywords.reduce((acc, word) => acc + (cleanText.includes(word) ? 1 : 0), 0);
        let score4 = cat4Keywords.reduce((acc, word) => acc + (cleanText.includes(word) ? 1 : 0), 0);

        // Tie-breaker and evaluation
        let maxScore = Math.max(score1, score2, score3, score4);

        if (maxScore === 0) {
            // Contextual logic for untagged items based on length/phrases
            if (cleanText.includes('ate') || cleanText.includes('hungry') || cleanText.includes('just')) {
                categoryId = 3;
                reason = "Detected contextual craving indicators. Marked as Unnecessary and Short term.";
            } else if (cleanText.includes('buy') || cleanText.includes('bought')) {
                categoryId = 4;
                reason = "Detected casual asset acquisition. Marked as Unnecessary and Long term.";
            } else {
                categoryId = 3; 
                reason = "No matching markers found. Categorized as Unnecessary Short-term by caution rules.";
            }
        } else {
            if (maxScore === score1) {
                categoryId = 1;
                reason = "Matches markers relating directly to essential daily survival, utility bills, or unexpected urgent needs.";
            } else if (maxScore === score2) {
                categoryId = 2;
                reason = "Matches indicators mapped to major life investments, core recurring liabilities, or forward security items.";
            } else if (maxScore === score3) {
                categoryId = 3;
                reason = "Matches indicators mapped to fleeting impulse buying, food cravings, or immediate entertainment expenses.";
            } else if (maxScore === score4) {
                categoryId = 4;
                reason = "Matches indicators mapped to modern non-essential physical assets, gaming, collections, or unutilized hardware.";
            }
        }
    }

    // Map ID integers to Display Properties
    const categories = {
        1: "Necessary and Immediate/Short term",
        2: "Necessary and Long term",
        3: "Unnecessary and Short term",
        4: "Unnecessary and Long term"
    };

    // Render results dynamically via CSS variables
    document.getElementById('resCategoryName').innerText = categories[categoryId];
    document.getElementById('resReasoning').innerText = reason;
    
    const tag = document.getElementById('categoryTag');
    tag.innerText = `Category ${categoryId}`;
    
    resultBox.className = 'result-box'; // reset
    resultBox.classList.add('active', `cat-${categoryId}`);
}
</script>

</body>
</html>
