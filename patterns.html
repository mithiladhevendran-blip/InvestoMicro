<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Result - InvestoMicro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; padding: 40px; max-width: 520px; margin: auto; text-align: center; background: #0f172a; color: white; min-height: 100vh; display: flex; align-items: center;}
        .card { padding: 30px; border-radius: 24px; background: #1e293b; border: 1px solid #334155; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h3 { color: #60a5fa; font-size: 1.55rem; margin: 20px 0; }
        .desc { color: #94a3b8; line-height: 1.6; margin: 20px 0; min-height: 90px; }
        button { padding: 16px; background: #3b82f6; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        button:hover:not(:disabled) { background: #2563eb; transform: translateY(-2px); }
        button:disabled { background: #475569; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: #94a3b8; font-size: 1rem; text-transform: uppercase; letter-spacing: 2px;">AI Spend Analysis</h2>
        <h3 id="cat">Analyzing with Gemini...</h3>
        <p id="desc" class="desc"></p>
        <button id="saveBtn">Confirm & Save ₹0</button>
        <p id="saveStatus" class="status"></p>
    </div>

<script type="module">
    const GEMINI_API_KEY = "YOUR_GEMINI_API_KEY_HERE";   // ← Change this

    const _supabase = supabase.createClient(
        'https://funcvigewkhauenqxrbf.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1bmN2aWdld2toYXVlbnF4cmJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NTM1MzQsImV4cCI6MjA5NDEyOTUzNH0.INR7nkrv-CV80i97SyaHwdZd3chlQjaVgNsQY39Nqxo'
    );

    const sms = (localStorage.getItem('lastSMS') || "").trim();
    let finalCategory = "Short Term Not Necessary";
    let finalAmount = 0;

    function extractAmount(text) {
        const regex = /(?:₹|Rs\.?|INR)?\s*(\d{1,3}(?:,\d{3})*|\d+)(?:\.\d{1,2})?/gi;
        let match, max = 0;
        while ((match = regex.exec(text)) !== null) {
            const num = parseFloat(match[1].replace(/,/g, ''));
            if (num > max) max = num;
        }
        return max;
    }

    finalAmount = extractAmount(sms);

    async function runAnalysis() {
        document.getElementById('saveBtn').disabled = true;
        document.getElementById('cat').innerText = "Gemini Thinking...";

        try {
            const prompt = `Classify this expense into ONE category only.
Message: "${sms}"
Amount: ₹${finalAmount}

Categories:
- Long Term Necessary
- Short Term Important  
- Short Term Not Necessary
- Long Term Not Necessary

Reply in this exact format:
Category: [category name]
Reason: [one short reason]`;

            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await res.json();
            const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";

            if (text.toLowerCase().includes("long term necessary")) finalCategory = "Long Term Necessary";
            else if (text.toLowerCase().includes("short term important")) finalCategory = "Short Term Important";
            else if (text.toLowerCase().includes("long term not necessary")) finalCategory = "Long Term Not Necessary";
            else finalCategory = "Short Term Not Necessary";

            document.getElementById('desc').innerHTML = `<strong>${finalCategory}</strong><br><small>${text}</small>`;

        } catch (e) {
            document.getElementById('desc').innerText = "Using rules...";
            finalCategory = /fence|buffalo|farm|school|rent|medical|fee/i.test(sms.toLowerCase()) ? "Long Term Necessary" : "Short Term Not Necessary";
        }

        document.getElementById('cat').innerText = finalCategory;
        document.getElementById('saveBtn').innerText = `Confirm & Save ₹${finalAmount}`;
        document.getElementById('saveBtn').disabled = false;
    }

    window.saveToCloud = async () => {
        const btn = document.getElementById('saveBtn');
        btn.innerText = "Saving...";
        btn.disabled = true;

        const { data: { user } } = await _supabase.auth.getUser();
        if (!user) return alert("Please login");

        await _supabase.from('spends').insert([{
            user_id: user.id,
            category: finalCategory,
            description: sms,
            amount: finalAmount,
            created_at: new Date().toISOString()
        }]);

        window.location.href = 'patterns.html';
    };

    if (sms) runAnalysis();
    else document.getElementById('cat').innerText = "No SMS found";
</script>
</body>
</html>
