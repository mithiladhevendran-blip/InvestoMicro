<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Result - InvestoMicro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; padding: 40px; max-width: 500px; margin: auto; text-align: center; background: #0f172a; color: white; display: flex; align-items: center; min-height: 100vh; }
        .card { padding: 30px; border-radius: 24px; background: #1e293b; border: 1px solid #334155; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h3 { color: #60a5fa; font-size: 1.6rem; margin: 20px 0; letter-spacing: -0.5px; }
        .desc { color: #94a3b8; line-height: 1.5; margin-bottom: 30px; min-height: 50px; }
        button { padding: 16px; background: #3b82f6; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; }
        button:hover { background: #2563eb; transform: translateY(-2px); }
        .status { font-size: 0.7rem; color: #475569; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: #94a3b8; font-size: 1rem; text-transform: uppercase; letter-spacing: 2px;">AI Analysis</h2>
        <h3 id="cat">Processing...</h3>
        <p id="desc" class="desc"></p>
        <button id="saveBtn" onclick="saveToCloud()">Confirm & Save to Cloud</button>
        <p id="saveStatus" class="status"></p>
    </div>
<script type="module">
    // 1. Import the AI library
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.6.0';

    const S_URL = 'https://funcvigewkhauenqxrbf.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1bmN2aWdld2toYXVlbnF4cmJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NTM1MzQsImV4cCI6MjA5NDEyOTUzNH0.INR7nkrv-CV80i97SyaHwdZd3chlQjaVgNsQY39Nqxo';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    const sms = localStorage.getItem('lastSMS') || "";
    const catElement = document.getElementById('cat');
    const descElement = document.getElementById('desc');
    const saveBtn = document.getElementById('saveBtn');

    let finalCategory = "";
    let finalAmount = 0;

    async function runAI() {
        catElement.innerText = "AI is thinking...";
        saveBtn.disabled = true;

        // Extract amount from text (e.g., "Fence 500" -> 500)
        const amountMatch = sms.match(/\d+/);
        finalAmount = amountMatch ? parseFloat(amountMatch[0]) : 0;

        try {
            // 2. Load the Zero-Shot Classification Model
            // This happens in the browser!
            const classifier = await pipeline('zero-shot-classification', 'Xenova/mobilebert-uncased-mnli-all');
            
            const labels = [
                'Long Term / Necessary', 
                'Short Term / Important', 
                'Short Term / Not Necessary', 
                'Long Term / Not Necessary'
            ];

            // 3. Let the AI decide
            const output = await classifier(sms, labels);
            finalCategory = output.labels[0]; // The top prediction

            // UI Update
            catElement.innerText = finalCategory;
            descElement.innerText = `AI Analysis: This appears to be a ${finalCategory} expense of $${finalAmount}.`;
            saveBtn.disabled = false;
            saveBtn.innerText = "Confirm & Save to Cloud";

        } catch (err) {
            console.error(err);
            catElement.innerText = "AI Error";
            descElement.innerText = "Could not load the AI model.";
        }
    }

    // This makes the Save function available to the button
    window.saveToCloud = async () => {
        saveBtn.innerText = "Saving...";
        const { error } = await _supabase.from('spends').insert([{ 
    user_id: user.id, 
    category: finalCategory, 
    description: sms,
    amount: finalAmount  // <--- This line is the "secret sauce" for your chart!
}]);

            if (!error) window.location.href = 'patterns.html';
            else alert("Error: " + error.message);
        }
    };

    runAI();
</script></body>
</html>
