<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvestoMicro - AI Expense Classifier</title>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f9fafb;
            --card-bg: #ffffff;
            --text: #111827;
            --border: #e5e7eb;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        h2 { margin-top: 0; color: var(--primary); }
        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        input, textarea {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 15px;
            outline: none;
        }
        input:focus, textarea:focus { border-color: var(--primary); }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        button:disabled { background-color: #9ca3af; cursor: not-allowed; }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            border-left: 5px solid #d1d5db;
            background: #f3f4f6;
            display: none;
        }
        .result-box.active { display: block; }
        .category-tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        /* Dynamic Category Accent Colors */
        .cat-1 { background: #dcfce7; color: #166534; border-left-color: #22c55e !important; }
        .cat-2 { background: #dbeafe; color: #1e40af; border-left-color: #3b82f6 !important; }
        .cat-3 { background: #fef3c7; color: #92400e; border-left-color: #f59e0b !important; }
        .cat-4 { background: #fee2e2; color: #991b1b; border-left-color: #ef4444 !important; }
        .loader { font-style: italic; color: #6b7280; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>InvestoMicro AI Classifier</h2>
    
    <div class="form-group">
        <label for="apiKey">Gemini API Key</label>
        <input type="password" id="apiKey" placeholder="Paste your AI Studio API key here...">
        <small style="color:#6b7280; margin-top:4px;">Keys are processed locally in your browser. Get one free via Google AI Studio.</small>
    </div>

    <div class="form-group">
        <label for="expenseInput">What did you spend money on?</label>
        <textarea id="expenseInput" rows="3" placeholder="e.g., Bought a double cheeseburger right after eating lunch, or paid annual health insurance premium..."></textarea>
    </div>

    <button id="submitBtn" onclick="classifyExpense()">Analyze with AI</button>
    
    <div id="loader" class="loader">AI is evaluating your decision traits...</div>

    <div id="resultBox" class="result-box">
        <div id="categoryTag" class="category-tag">Category</div>
        <div style="font-weight: 600; font-size: 18px; margin-bottom: 8px;" id="resCategoryName"></div>
        <p id="resReasoning" style="margin: 0; line-height: 1.5; color: #4b5563;"></p>
    </div>
</div>

<script>
async function classifyExpense() {
    const apiKey = document.getElementById('apiKey').value.trim();
    const expense = document.getElementById('expenseInput').value.trim();
    const submitBtn = document.getElementById('submitBtn');
    const loader = document.getElementById('loader');
    const resultBox = document.getElementById('resultBox');

    if (!apiKey) { alert('Please enter your Gemini API Key first.'); return; }
    if (!expense) { alert('Please type an expense description.'); return; }

    // UI Feedback States
    submitBtn.disabled = true;
    loader.style.display = 'block';
    resultBox.className = 'result-box'; 

    // Explicit Prompt Structure ensuring 4-category parsing and absolute prioritization rules
    const systemPrompt = `You are a financial classification engine. Classify the user's expense description into exactly one of these 4 specific categories:
1. "Necessary and Immediate/Short term"
2. "Necessary and Long term"
3. "Unnecessary and Short term"
4. "Unnecessary and Long term"

CRITICAL RULE: If the expense explicitly mentions a "gift" (or presents for someone), you MUST classify it into category 1: "Necessary and Immediate/Short term". Otherwise, use advanced contextual financial logic.

Respond ONLY with a valid raw JSON object matching this structure without Markdown formatting:
{
  "category_id": 1,
  "category_name": "Exact category string name",
  "reasoning": "A concise single-sentence human-friendly explanation explaining why it falls into this category based on logic."
}`;

    try {
        const response = await fetch(`https://googleapis.com{apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{
                    parts: [
                        { text: systemPrompt },
                        { text: `User Expense input to classify: "${expense}"` }
                    ]
                }],
                generationConfig: {
                    responseMimeType: "application/json"
                }
            })
        });

        if (!response.ok) throw new Error(`API Error: ${response.statusText}`);
        
        const data = await response.json();
        const rawText = data.candidates[0].content.parts[0].text;
        const result = JSON.parse(rawText.trim());

        // Display results and bind visual color accents
        document.getElementById('resCategoryName').innerText = result.category_name;
        document.getElementById('resReasoning').innerText = result.reasoning;
        
        const tag = document.getElementById('categoryTag');
        tag.innerText = `Category ${result.category_id}`;
        
        resultBox.classList.add('active', `cat-${result.category_id}`);

    } catch (error) {
        alert(`Failed to classify. Ensure your API Key is correct. Error details: ${error.message}`);
        console.error(error);
    } finally {
        submitBtn.disabled = false;
        loader.style.display = 'none';
    }
}
</script>

</body>
</html>
