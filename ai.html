<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Result - InvestoMicro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            padding: 40px; 
            max-width: 520px; 
            margin: auto; 
            text-align: center; 
            background: #0f172a; 
            color: white; 
            display: flex; 
            align-items: center; 
            min-height: 100vh; 
        }
        .card { 
            padding: 30px; 
            border-radius: 24px; 
            background: #1e293b; 
            border: 1px solid #334155; 
            width: 100%; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        h3 { color: #60a5fa; font-size: 1.55rem; margin: 20px 0; letter-spacing: -0.5px; }
        .desc { color: #94a3b8; line-height: 1.6; margin-bottom: 25px; min-height: 70px; }
        button { 
            padding: 16px; 
            background: #3b82f6; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%; 
            font-size: 1.05rem;
        }
        button:hover:not(:disabled) { background: #2563eb; transform: translateY(-2px); }
        button:disabled { background: #475569; cursor: not-allowed; }
        .status { font-size: 0.75rem; color: #64748b; margin-top: 12px; }
        .confidence { font-size: 0.82rem; color: #22c55e; margin-top: 6px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: #94a3b8; font-size: 1rem; text-transform: uppercase; letter-spacing: 2px;">AI Spend Analysis</h2>
        <h3 id="cat">Analyzing...</h3>
        <p id="desc" class="desc"></p>
        <button id="saveBtn">Confirm & Save</button>
        <p id="saveStatus" class="status"></p>
    </div>

<script type="module">
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.6.0';
    env.allowLocalModels = false;

    const S_URL = 'https://funcvigewkhauenqxrbf.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1bmN2aWdld2toYXVlbnF4cmJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NTM1MzQsImV4cCI6MjA5NDEyOTUzNH0.INR7nkrv-CV80i97SyaHwdZd3chlQjaVgNsQY39Nqxo';
    
    const _supabase = supabase.createClient(S_URL, S_KEY);

    const sms = (localStorage.getItem('lastSMS') || "").trim();
    const catElement = document.getElementById('cat');
    const descElement = document.getElementById('desc');
    const saveBtn = document.getElementById('saveBtn');

    let finalCategory = "Short Term / Not Necessary";
    let finalAmount = 0;

    // Improved Amount Extraction
    function extractAmount(text) {
        const regex = /(?:₹|Rs\.?|INR)?\s*(\d{1,3}(?:,\d{3})*|\d+)(?:\.\d{1,2})?/gi;
        let match, max = 0;
        while ((match = regex.exec(text)) !== null) {
            const num = parseFloat(match[1].replace(/,/g, ''));
            if (num > max) max = num;
        }
        return max;
    }

    finalAmount = extractAmount(sms);

    const labels = [
        "Long Term Necessary",
        "Short Term Important",
        "Short Term Not Necessary",
        "Long Term Not Necessary"
    ];

    async function runAnalysis() {
        saveBtn.disabled = true;
        catElement.innerText = "AI Analyzing...";

        try {
            const classifier = await pipeline('zero-shot-classification', 
                'Xenova/distilbert-base-uncased-mnli-all-mini-v2', { quantized: true });

            const output = await classifier(sms, labels, {
                hypothesisTemplate: "This is a {} expense.",
            });

            finalCategory = output.labels[0];
            const confidence = (output.scores[0] * 100).toFixed(1);

            descElement.innerHTML = `AI classified as <strong>${finalCategory}</strong><br><span class="confidence">Confidence: ${confidence}%</span>`;

        } catch (e) {
            console.log("AI model failed, using advanced rules");
            descElement.innerText = "Using smart rules (offline mode)";
            finalCategory = applyAdvancedRules(sms);
        }

        catElement.innerText = finalCategory;
        saveBtn.innerText = `Confirm & Save ₹${finalAmount}`;
        saveBtn.disabled = false;
    }

    // === Much Stronger Rules ===
    function applyAdvancedRules(text) {
        const lower = text.toLowerCase();

        // === Long Term Necessary ===
        if (/fence|buffalo|cow|goat|farm|agri|tractor|land|plot|house|rent|emi|loan|insurance|medical|hospital|doctor|school|college|fee|tuition|textbook|book|education/i.test(lower)) {
            return "Long Term Necessary";
        }

        // === Short Term Important ===
        if (/milk|grocery|rice|atta|dal|vegetable|gas|electricity|water|internet|bus|auto|petrol/i.test(lower)) {
            return "Short Term Important";
        }

        // === Short Term Not Necessary ===
        if (/movie|game|hotel|restaurant|party|beer|whisky|shopping|clothes|shoes|mobile|game/i.test(lower)) {
            return "Short Term Not Necessary";
        }

        return "Short Term Not Necessary"; // default
    }

    window.saveToCloud = async () => {
        saveBtn.innerText = "Saving...";
        saveBtn.disabled = true;

        try {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) return alert("Please login first");

            const { error } = await _supabase.from('spends').insert([{
                user_id: user.id,
                category: finalCategory,
                description: sms,
                amount: finalAmount,
                created_at: new Date().toISOString()
            }]);

            if (!error) window.location.href = 'patterns.html';
            else alert("Error: " + error.message);
        } catch (err) {
            alert("Save failed. Try again.");
            saveBtn.innerText = `Confirm & Save ₹${finalAmount}`;
            saveBtn.disabled = false;
        }
    };

    if (!sms) {
        catElement.innerText = "No SMS Detected";
        descElement.innerText = "Go back and select a message first.";
    } else {
        runAnalysis();
    }
</script>
</body>
</html>
