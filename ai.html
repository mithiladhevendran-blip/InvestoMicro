<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Analysis - InvestoMicro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; margin:0; padding:20px; min-height:100vh; }
        .card { background:#1e293b; padding:30px; border-radius:24px; border:1px solid #334155; }
        h3 { color:#60a5fa; }
        button { width:100%; padding:16px; margin:8px 0; border:none; border-radius:12px; font-weight:bold; cursor:pointer; }
        .primary { background:#3b82f6; }
        .secondary { background:#475569; }
        .nav { position:fixed; bottom:0; left:0; right:0; background:#1e293b; border-top:1px solid #334155; display:flex; padding:8px; max-width:520px; margin:0 auto; }
        .nav button { flex:1; margin:0 4px; padding:12px; font-size:0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2>AI Spend Analysis</h2>
        <h3 id="cat">Analyzing...</h3>
        <p id="desc" style="min-height:100px;"></p>
        <button id="saveBtn" class="primary">Confirm & Save ₹0</button>
        <button id="skipBtn" class="secondary">Skip → Patterns</button>
    </div>

    <div class="nav">
        <button onclick="location.href='ai.html'">AI</button>
        <button onclick="location.href='patterns.html'">Patterns</button>
        <button onclick="location.href='suggestions.html'">Suggestions</button>
    </div>

<script type="module">
    const GEMINI_KEY = "YOUR_GEMINI_API_KEY_HERE";

    const supabase = supabase.createClient('https://funcvigewkhauenqxrbf.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1bmN2aWdld2toYXVlbnF4cmJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NTM1MzQsImV4cCI6MjA5NDEyOTUzNH0.INR7nkrv-CV80i97SyaHwdZd3chlQjaVgNsQY39Nqxo');

    const sms = (localStorage.getItem('lastSMS') || "").trim();
    let finalCategory = "Short Term Not Necessary";
    let finalAmount = 0;

    function extractAmount(txt) {
        const m = txt.match(/\d+(?:,\d+)*(?:\.\d+)?/g);
        return m ? Math.max(...m.map(n => parseFloat(n.replace(/,/g,'')))) : 0;
    }
    finalAmount = extractAmount(sms);

    async function analyze() {
        document.getElementById('saveBtn').disabled = true;
        document.getElementById('cat').innerText = "Gemini Analyzing...";

        try {
            const prompt = `Classify expense: "${sms}" (₹${finalAmount})\nReply exactly:\nCategory: Long Term Necessary / Short Term Important / Short Term Not Necessary / Long Term Not Necessary\nReason: short reason`;

            const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_KEY}`, {
                method:"POST", headers:{"Content-Type":"application/json"},
                body: JSON.stringify({contents:[{parts:[{text:prompt}]}]})
            });
            const d = await r.json();
            const t = d.candidates?.[0]?.content?.parts?.[0]?.text || "";

            if (t.includes("Long Term Necessary")) finalCategory = "Long Term Necessary";
            else if (t.includes("Short Term Important")) finalCategory = "Short Term Important";
            else if (t.includes("Long Term Not Necessary")) finalCategory = "Long Term Not Necessary";

            document.getElementById('desc').innerHTML = `<strong>${finalCategory}</strong><br><small>${t}</small>`;
        } catch(e) {
            finalCategory = /fence|buffalo|farm|school|rent|medical|fee/i.test(sms.toLowerCase()) ? "Long Term Necessary" : "Short Term Not Necessary";
            document.getElementById('desc').innerText = "Rules-based analysis";
        }

        document.getElementById('cat').innerText = finalCategory;
        document.getElementById('saveBtn').innerText = `Confirm & Save ₹${finalAmount}`;
        document.getElementById('saveBtn').disabled = false;
    }

    window.saveToCloud = async () => {
        const btn = document.getElementById('saveBtn');
        btn.innerText = "Saving..."; btn.disabled=true;
        const {data:{user}} = await supabase.auth.getUser();
        if(!user) return alert("Login required");

        await supabase.from('spends').insert([{
            user_id: user.id,
            category: finalCategory,
            description: sms,
            amount: finalAmount,
            created_at: new Date().toISOString()
        }]);
        alert("Saved!");
        location.href = 'patterns.html';
    };

    document.getElementById('skipBtn').onclick = () => location.href = 'patterns.html';

    if(sms) analyze();
    else document.getElementById('cat').innerText = "No SMS";
</script>
</body>
</html>
