<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Input - InvestoMicro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --border-color: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-emerald: #10b981;
        }

        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: var(--bg-main); 
            margin: 0; 
            color: var(--text-main); 
            padding: 20px;
            padding-bottom: 120px; 
            box-sizing: border-box; 
        }

        .top-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            width: 480px; 
            background: var(--bg-card); 
            padding: 12px 18px; 
            border-radius: 16px; 
            border: 1px solid var(--border-color); 
            margin-bottom: 18px; 
            box-sizing: border-box; 
        }
        .brand { font-weight: bold; color: var(--accent-blue); font-size: 1.1rem; }
        .profile-badge { background: var(--accent-blue); color: white; padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; }
        .profile-badge:hover { background: #2563eb; }

        .box { 
            background: var(--bg-card); 
            padding: 2.2rem; 
            border-radius: 20px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4); 
            width: 480px; 
            text-align: center; 
            border: 1px solid var(--border-color); 
            box-sizing: border-box; 
        }

        h2 { margin-top: 0; margin-bottom: 1.5rem; font-weight: 700; font-size: 1.4rem; color: var(--text-main); }
        
        .input-group { text-align: left; margin-bottom: 18px; }
        .input-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
        .input-group input { width: 100%; padding: 12px 16px; background: var(--bg-main); border: 1px solid var(--border-color); border-radius: 12px; color: white; font-size: 1rem; box-sizing: border-box; transition: border 0.2s; }
        .input-group input:focus { border-color: var(--accent-blue); outline: none; }

        .btn-submit { width: 100%; padding: 14px; background: var(--accent-blue); border: none; border-radius: 12px; color: white; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .btn-submit:hover { background: #2563eb; }

        .nav-dock { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); border: 1px solid var(--border-color); display: flex; padding: 8px; width: 440px; border-radius: 16px; box-sizing: border-box; z-index: 100; }
        .nav-dock button { flex: 1; margin: 0 4px; padding: 12px; background: transparent; border: none; border-radius: 10px; color: var(--text-muted); font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.2s ease; }
        .nav-dock button:hover { color: var(--text-main); background: rgba(255, 255, 255, 0.05); }
        .nav-dock .active { background: var(--accent-blue); color: white !important; font-weight: 600; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="brand">InvestoMicro</div>
        <button class="profile-badge" onclick="location.href='profile.html'">👤 Profile</button>
    </div>

    <div class="box">
        <h2>📥 Record Transaction</h2>
        <div class="input-group">
            <label>Amount (₹)</label>
            <input type="number" id="tx-amount" placeholder="e.g. 500">
        </div>
        <div class="input-group">
            <label>Description / Note</label>
            <input type="text" id="tx-desc" placeholder="e.g. text books">
        </div>
        <button class="btn-submit" onclick="processToAiAnalysis()">Analyze Intent →</button>
    </div>

    <div class="nav-dock">
        <button class="active" onclick="location.href='input.html'">Input</button>
        <button onclick="location.href='ai.html'">AI Analysis</button>
        <button onclick="location.href='patterns.html'">Patterns</button>
        <button onclick="location.href='suggest.html'">Suggestions</button>
    </div>

    <script>
        function processToAiAnalysis() {
            const amt = document.getElementById('tx-amount').value;
            const desc = document.getElementById('tx-desc').value;
            if(!amt || !desc) { alert("Please complete all inputs"); return; }
            
            // Storing temporarily to share data across pages without database friction
            localStorage.setItem('pending_amt', amt);
            localStorage.setItem('pending_desc', desc);
            window.location.href = 'ai.html';
        }
    </script>
</body>
</html>
