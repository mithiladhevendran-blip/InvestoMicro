<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyze Payment - MicroInvest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --border-color: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-blue-hover: #2563eb;
            --accent-emerald: #10b981;
            --accent-emerald-hover: #059669;
            --accent-red: #ef4444;
        }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: var(--bg-main); 
            margin: 0; 
            color: var(--text-main); 
            padding-bottom: 100px; 
            box-sizing: border-box; 
            -webkit-font-smoothing: antialiased;
        }

        .box { 
            background: var(--bg-card); 
            padding: 2.5rem; 
            border-radius: 20px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4); 
            width: 440px; 
            text-align: center; 
            border: 1px solid var(--border-color); 
            box-sizing: border-box; 
        }

        h2 { 
            margin-top: 0; 
            margin-bottom: 0.5rem; 
            color: var(--text-main); 
            font-weight: 700;
            font-size: 1.75rem;
            letter-spacing: -0.03em; 
        }

        p { 
            color: var(--text-muted); 
            font-size: 0.9rem; 
            margin-bottom: 2rem; 
            font-weight: 400;
        }
        
        .field-group { 
            text-align: left; 
            margin-bottom: 18px; 
        }

        .field-group label { 
            display: block; 
            font-size: 0.75rem; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            font-weight: 600; 
            margin-bottom: 8px; 
            letter-spacing: 0.05em; 
        }
        
        textarea, input { 
            width: 100%; 
            padding: 14px; 
            border-radius: 12px; 
            border: 1px solid var(--border-color); 
            box-sizing: border-box; 
            background: var(--bg-main); 
            color: white; 
            font-size: 0.95rem; 
            outline: none; 
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        textarea {
            height: 90px;
            resize: none;
        }

        textarea:focus, input:focus { 
            border-color: var(--accent-blue); 
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        
        .inline-fields { 
            display: flex; 
            gap: 12px; 
            margin-bottom: 18px; 
        }

        .inline-fields .field-group { 
            flex: 1; 
            margin-bottom: 0; 
        }

        button.btn-primary { 
            width: 100%; 
            padding: 14px; 
            background: var(--accent-emerald); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 600; 
            transition: all 0.2s ease; 
            font-size: 0.95rem; 
            margin-top: 5px; 
        }

        button.btn-primary:hover { 
            background: var(--accent-emerald-hover); 
            transform: translateY(-1px); 
        }

        button.btn-primary:active {
            transform: translateY(0);
        }

        .logout-btn { 
            background: none; 
            color: var(--accent-red); 
            border: none; 
            margin-top: 24px; 
            cursor: pointer; 
            font-size: 0.8rem; 
            font-weight: 500;
            text-decoration: none; 
            padding: 5px; 
            width: auto; 
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .logout-btn:hover { 
            opacity: 1;
            text-decoration: underline;
        }
        
        /* Analytics Blocks Panels */
        .analytics-container { 
            margin-top: 28px; 
            border-top: 1px solid var(--border-color); 
            padding-top: 24px; 
            text-align: left; 
        }

        .analytics-title { 
            font-size: 0.75rem; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            letter-spacing: 0.08em; 
            margin-bottom: 14px; 
            font-weight: 700; 
            text-align: center; 
        }

        .metric-card { 
            background: var(--bg-main); 
            padding: 14px 18px; 
            border-radius: 14px; 
            border: 1px solid var(--border-color); 
            margin-bottom: 12px; 
        }

        .metric-label { 
            font-size: 0.75rem; 
            color: #64748b; 
            margin-bottom: 6px; 
            font-weight: 600; 
        }

        .metric-value { 
            font-size: 0.95rem; 
            font-weight: 600; 
            color: #60a5fa; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            gap: 8px; 
        }

        .metric-sub { 
            font-size: 0.9rem; 
            color: var(--accent-emerald); 
            font-weight: 700; 
            white-space: nowrap; 
        }

        /* Fixed Navigation Menu Dock Bar */
        .nav-dock { 
            position: fixed; 
            bottom: 24px; 
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 41, 59, 0.8); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color); 
            display: flex; 
            padding: 8px; 
            width: 440px; 
            border-radius: 16px;
            box-sizing: border-box; 
            z-index: 100; 
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.5);
        }

        .nav-dock button { 
            flex: 1; 
            margin: 0 4px; 
            padding: 12px; 
            background: transparent; 
            border: none; 
            border-radius: 10px; 
            color: var(--text-muted); 
            font-size: 0.85rem; 
            font-weight: 500; 
            cursor: pointer; 
            transition: all 0.2s ease;
            width: auto; 
        }

        .nav-dock button:hover { 
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-dock .active { 
            background: var(--accent-blue); 
            color: white !important;
            font-weight: 600; 
        }
    </style>
</head>
<body>

    <div class="box">
        <h2>Analyze Payment</h2>
        <p>Paste bank statement string or type details manually.</p>
        
        <div class="field-group">
            <label for="sms">Statement Data / Entry Text</label>
            <textarea id="sms" placeholder="e.g., HDFC Bank: Credit Card Txn on account XX123 for INR 1500..." oninput="autoExtractAmount()"></textarea>
        </div>

        <div class="inline-fields">
            <div class="field-group">
                <label for="amount">Transaction Amount (₹)</label>
                <input type="number" id="amount" placeholder="e.g., 1500">
            </div>
        </div>

        <div class="field-group">
            <label for="exactItemDesc">Item Description (Where was it spent?)</label>
            <textarea id="exactItemDesc" style="height: 75px;" placeholder="e.g., dog vet clinical checkup, groceries..."></textarea>
        </div>
        
        <button class="btn-primary" onclick="analyze()">Run Local Classification</button>
        
        <div class="analytics-container">
            <div class="analytics-title">Spend Insights</div>
            
            <div class="metric-card">
                <div class="metric-label">💰 Highest Cumulative Capital Destination</div>
                <div class="metric-value" id="top-amount-cat"><span style="color:#64748b; font-weight:normal;">Loading log metrics...</span></div>
            </div>

            <div class="metric-card">
                <div class="metric-label">📊 Most Frequent Transaction Volume</div>
                <div class="metric-value" id="top-count-cat"><span style="color:#64748b; font-weight:normal;">Loading transaction metrics...</span></div>
            </div>
        </div>

        <button class="logout-btn" onclick="handleLogout()">Sign Out of Application</button>
    </div>

    <div class="nav-dock">
        <button class="active" onclick="location.href='input.html'">Input</button>
        <button onclick="location.href='ai.html'">AI Analysis</button>
        <button onclick="location.href='patterns.html'">Patterns</button>
        <button onclick="location.href='suggest.html'">Suggestions</button>
    </div>

    <script src="config.js"></script>
    <script>
        // Use our global modular check routing mechanism 
        async function runSecurityGateCheck() {
            const user = await checkActiveSession(false);
            if (user) {
                loadUserMetrics(user.id);
            }
        }
        runSecurityGateCheck();

        // Safe regex utility to pull amounts dynamically from complex text banking lines
        function autoExtractAmount() {
            const rawText = document.getElementById('sms').value;
            const regex = /(?:rs\.?|inr|spent|amt|vpa)\s*([0-9,]+(?:\.[0-9]+)?)/i;
            const match = rawText.match(regex);
            if (match && match[1]) {
                const cleanNum = match[1].replace(/,/g, '');
                document.getElementById('amount').value = parseFloat(cleanNum);
            }
        }

        async function loadUserMetrics(userId) {
            try {
                let { data: expenses, error } = await _supabase
                    .from('expenses')
                    .select('category, amount')
                    .eq('user_id', userId);

                if (error) throw error;

                if (!expenses || expenses.length === 0) {
                    document.getElementById('top-amount-cat').innerHTML = `<span style="color:#64748b; font-weight:normal;">No history tracked yet</span>`;
                    document.getElementById('top-count-cat').innerHTML = `<span style="color:#64748b; font-weight:normal;">No history tracked yet</span>`;
                    return;
                }

                const amountMap = {};
                const countMap = {};

                expenses.forEach(entry => {
                    const cat = entry.category || 'Uncategorized';
                    const amt = Number(entry.amount) || 0;

                    amountMap[cat] = (amountMap[cat] || 0) + amt;
                    countMap[cat] = (countMap[cat] || 0) + 1;
                });

                let maxAmtCat = '', maxAmtVal = -1;
                let maxCntCat = '', maxCntVal = -1;

                for (const cat in amountMap) {
                    if (amountMap[cat] > maxAmtVal) {
                        maxAmtVal = amountMap[cat];
                        maxAmtCat = cat;
                    }
                    if (countMap[cat] > maxCntVal) {
                        maxCntVal = countMap[cat];
                        maxCntCat = cat;
                    }
                }

                const cleanLabel = (c) => c.replace("And Immediate/Short term", "").replace("And", "&");

                document.getElementById('top-amount-cat').innerHTML = `<span>${cleanLabel(maxAmtCat)}</span> <span class="metric-sub">₹${maxAmtVal.toLocaleString()}</span>`;
                document.getElementById('top-count-cat').innerHTML = `<span>${cleanLabel(maxCntCat)}</span> <span class="metric-sub" style="color:#60a5fa">${maxCntVal} txns</span>`;

            } catch (err) {
                console.error("Metric computation fault:", err);
            }
        }

        function analyze() {
            const statementInput = document.getElementById('sms').value.trim();
            const amountInput = document.getElementById('amount').value.trim();
            const descriptionInput = document.getElementById('exactItemDesc').value.trim();

            if (!statementInput) { alert('Please enter statement records or a purchase description.'); return; }
            if (!amountInput) { alert('Please enter or verify the transaction value numeric amount.'); return; }
            if (!descriptionInput) { alert('Please clarify where this capital was spent in the item description field.'); return; }

            localStorage.setItem('lastSMS', statementInput);
            localStorage.setItem('lastAmount', amountInput);
            localStorage.setItem('userFinerContext', descriptionInput);
            
            window.location.href = 'ai.html';
        }

        async function handleLogout() {
            await _supabase.auth.signOut();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
