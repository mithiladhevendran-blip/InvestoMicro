<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Payment - InvestoMicro</title>
    <!-- Corrected full dependency module load for Supabase Client operations -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; background: #0f172a; margin: 0; color: #f8fafc; padding-bottom: 90px; box-sizing: border-box; }
        .box { background: #1e293b; padding: 2.5rem; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); width: 440px; text-align: center; border: 1px solid #334155; box-sizing: border-box; }
        h2 { margin-top: 0; margin-bottom: 0.5rem; color: #3b82f6; letter-spacing: -1px; }
        p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 1.5rem; }
        
        .field-group { text-align: left; margin-bottom: 15px; }
        .field-group label { display: block; font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; font-weight: bold; margin-bottom: 6px; letter-spacing: 0.5px; }
        
        textarea { width: 100%; height: 100px; padding: 12px; border-radius: 12px; border: 1px solid #334155; box-sizing: border-box; background: #0f172a; color: white; font-size: 0.95rem; outline: none; resize: none; font-family: inherit; }
        textarea:focus { border-color: #3b82f6; }
        
        .inline-fields { display: flex; gap: 12px; margin-bottom: 15px; }
        .inline-fields .field-group { flex: 1; margin-bottom: 0; }
        input { width: 100%; padding: 12px; border: 1px solid #334155; border-radius: 12px; box-sizing: border-box; background: #0f172a; color: white; outline: none; font-size: 0.95rem; }
        input:focus { border-color: #3b82f6; }

        button { width: 100%; padding: 14px; background: #10b981; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 1rem; margin-top: 5px; }
        button:hover { background: #059669; transform: translateY(-2px); }
        .logout-btn { background: none; color: #ef4444; border: none; margin-top: 15px; cursor: pointer; font-size: 0.8rem; text-decoration: underline; padding: 5px; width: auto; }
        
        /* Analytics Blocks */
        .analytics-container { margin-top: 24px; border-top: 1px solid #334155; padding-top: 20px; text-align: left; }
        .analytics-title { font-size: 0.8rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; font-weight: bold; text-align: center; }
        .metric-card { background: #0f172a; padding: 12px 16px; border-radius: 14px; border: 1px solid #334155; margin-bottom: 10px; }
        .metric-label { font-size: 0.75rem; color: #64748b; margin-bottom: 4px; font-weight: 500; }
        .metric-value { font-size: 0.95rem; font-weight: bold; color: #60a5fa; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
        .metric-sub { font-size: 0.85rem; color: #10b981; font-weight: bold; white-space: nowrap; }

        /* Navigation Menu Bar */
        .nav { position: fixed; bottom: 0; left: 0; right: 0; background: #1e293b; border-top: 1px solid #334155; display: flex; padding: 10px; max-width: 520px; margin: 0 auto; box-sizing: border-box; z-index: 100; }
        .nav button { flex: 1; margin: 0 4px; padding: 14px; background: #334155; border: none; border-radius: 12px; color: white; font-size: 0.95rem; font-weight: normal; cursor: pointer; margin-top: 0; width: auto; }
        .nav button:hover { background: #475569; }
        .nav .active { background: #3b82f6; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Analyze Payment</h2>
        <p>Paste bank statement string or type manually.</p>
        
        <div class="field-group">
            <label for="sms">Statement Data / Entry Text</label>
            <textarea id="sms" placeholder="e.g., HDFC Bank: Credit Card Txn on account XX123 for INR 15000..." oninput="autoExtractAmount()"></textarea>
        </div>

        <div class="inline-fields">
            <div class="field-group">
                <label for="amount">Transaction Amount (₹)</label>
                <input type="number" id="amount" placeholder="e.g., 15000">
            </div>
        </div>

        <div class="field-group">
            <label for="exactItemDesc">Item Description (Where was it spent?)</label>
            <textarea id="exactItemDesc" style="height: 65px;" placeholder="e.g., bought fencing infrastructure for my farm, or gift for friend's marriage..."></textarea>
        </div>
        
        <button onclick="analyze()">Run Local Classification</button>
        
        <!-- Live Insight Summary Panels -->
        <div class="analytics-container">
            <div class="analytics-title">Spend Insights</div>
            
            <div class="metric-card">
                <div class="metric-label">💰 Highest Cumulative Capital Destination</div>
                <div class="metric-value" id="top-amount-cat"><span style="color:#64748b; font-weight:normal;">Loading log metrics...</span></div>
            </div>

            <div class="metric-card">
                <div class="metric-label">📊 Most Frequent Transaction Volume</div>
                <div class="metric-value" id="top-count-cat"><span style="color:#64748b; font-weight:normal;">Loading transaction metrics...</span></div>
            </div>
        </div>

        <button class="logout-btn" onclick="handleLogout()">Sign Out</button>
    </div>

    <!-- App System Menu Bar -->
    <div class="nav">
        <button class="active" onclick="location.href='input.html'">Input</button>
        <button onclick="location.href='ai.html'">AI Analysis</button>
        <button onclick="location.href='patterns.html'">Patterns</button>
        <button onclick="location.href='suggest.html'">Suggestions</button>
    </div>

    <script>
        const S_URL = 'https://supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1bmN2aWdld2toYXVlbnF4cmJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NTM1MzQsImV4cCI6MjA5NDEyOTUzNH0.INR7nkrv-CV80i97SyaHwdZd3chlQjaVgNsQY39Nqxo';
        const _supabase = supabase.createClient(S_URL, S_KEY);

        async function checkSession() {
            try {
                const { data } = await _supabase.auth.getSession();
                if (!data || !data.session) {
                    window.location.href = 'index.html';
                } else {
                    loadUserMetrics(data.session.user.id);
                }
            } catch (err) {
                window.location.href = 'index.html';
            }
        }
        checkSession();

        // Safe regex utility to pull amounts dynamically from complex banking lines
        function autoExtractAmount() {
            const rawText = document.getElementById('sms').value;
            // Matches 'rs. 500', 'inr 1,200', 'spent 450' patterns cleanly
            const regex = /(?:rs\.?|inr|spent|amt|vpa)\s*([0-9,]+(?:\.[0-9]+)?)/i;
            const match = rawText.match(regex);
            if (match && match[1]) {
                const cleanNum = match[1].replace(/,/g, '');
                document.getElementById('amount').value = parseFloat(cleanNum);
            }
        }

        async function loadUserMetrics(userId) {
            try {
                let { data: expenses, error } = await _supabase
                    .from('expenses')
                    .select('category, amount')
                    .eq('user_id', userId);

                if (error) {
                    const fallback = await _supabase.from('expenses').select('category, amount');
                    expenses = fallback.data;
                }

                if (!expenses || expenses.length === 0) {
                    document.getElementById('top-amount-cat').innerHTML = `<span style="color:#64748b; font-weight:normal;">No history tracked yet</span>`;
                    document.getElementById('top-count-cat').innerHTML = `<span style="color:#64748b; font-weight:normal;">No history tracked yet</span>`;
                    return;
                }

                const amountMap = {};
                const countMap = {};

                expenses.forEach(entry => {
                    const cat = entry.category || 'Uncategorized';
                    const amt = Number(entry.amount) || 0;

                    amountMap[cat] = (amountMap[cat] || 0) + amt;
                    countMap[cat] = (countMap[cat] || 0) + 1;
                });

                let maxAmtCat = '', maxAmtVal = -1;
                let maxCntCat = '', maxCntVal = -1;

                for (const cat in amountMap) {
                    if (amountMap[cat] > maxAmtVal) {
                        maxAmtVal = amountMap[cat];
                        maxAmtCat = cat;
                    }
                    if (countMap[cat] > maxCntVal) {
                        maxCntVal = countMap[cat];
                        maxCntCat = cat;
                    }
                }

                // Shorten text strings slightly to keep the UI beautiful
                const cleanLabel = (c) => c.replace("And Immediate/Short term", "").replace("And", "&");

                document.getElementById('top-amount-cat').innerHTML = `<span>${cleanLabel(maxAmtCat)}</span> <span class="metric-sub">₹${maxAmtVal.toLocaleString()}</span>`;
                document.getElementById('top-count-cat').innerHTML = `<span>${cleanLabel(maxCntCat)}</span> <span class="metric-sub" style="color:#60a5fa">${maxCntVal} txns</span>`;

            } catch (err) {
                console.error("Metric computation fault:", err);
            }
        }

        function analyze() {
            const statementInput = document.getElementById('sms').value.trim();
            const amountInput = document.getElementById('amount').value.trim();
            const descriptionInput = document.getElementById('exactItemDesc').value.trim();

            if (!statementInput) { alert('Please enter statement records or a purchase description.'); return; }
            if (!amountInput) { alert('Please enter or verify the transaction value numeric amount.'); return; }
            if (!descriptionInput) { alert('Please clarify where this capital was spent in the item description field.'); return; }

            // Stash variables safely across current working cache window
            localStorage.setItem('lastSMS', statementInput);
            localStorage.setItem('lastAmount', amountInput);
            localStorage.setItem('userFinerContext', descriptionInput);
            
            window.location.href = 'ai.html';
        }

        async function handleLogout() {
            await _supabase.auth.signOut();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
