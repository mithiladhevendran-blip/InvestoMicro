<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroInvest - Auth Suite</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #0f172a; margin: 0; color: #f8fafc; }
        .box { background: #1e293b; padding: 2.5rem; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); width: 380px; text-align: center; border: 1px solid #334155; box-sizing: border-box; }
        h2 { margin-top: 0; margin-bottom: 0.5rem; color: #3b82f6; letter-spacing: -1px; font-size: 1.8rem; }
        p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 2rem; margin-top: 0; }
        .form-group { text-align: left; margin-bottom: 14px; }
        label { display: block; font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; font-weight: bold; margin-bottom: 6px; }
        input[type="email"], input[type="password"] { width: 100%; padding: 14px; border: 1px solid #334155; border-radius: 12px; box-sizing: border-box; background: #0f172a; color: white; outline: none; font-size: 0.95rem; }
        input:focus { border-color: #3b82f6; }
        
        /* Custom Age Checkbox Styling */
        .checkbox-group { display: none; align-items: center; text-align: left; margin: 15px 0; background: #0f172a; padding: 12px; border-radius: 12px; border: 1px solid #334155; }
        .checkbox-group input { width: 18px; height: 18px; margin-right: 12px; cursor: pointer; }
        .checkbox-group label { text-transform: none; font-size: 0.85rem; color: #cbd5e1; font-weight: normal; margin-bottom: 0; cursor: pointer; }

        button { width: 100%; padding: 14px; background: #3b82f6; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 1.2rem; font-size: 1rem; transition: 0.3s; }
        button:hover { background: #2563eb; transform: translateY(-2px); }
        button:disabled { background: #475569; cursor: not-allowed; transform: none; }
        .utility-links { display: flex; justify-content: space-between; margin-top: 12px; font-size: 0.8rem; }
        .link-item { color: #60a5fa; cursor: pointer; text-decoration: underline; font-weight: 500; }
        .toggle-text { margin-top: 1.5rem; font-size: 0.85rem; color: #94a3b8; border-top: 1px solid #334155; padding-top: 15px; }
        .toggle-text span { color: #3b82f6; cursor: pointer; font-weight: 600; text-decoration: underline; }
        #error-msg { color: #ef4444; font-size: 0.85rem; margin-top: 10px; display: none; text-align: center; }
        #success-msg { color: #10b981; font-size: 0.85rem; margin-top: 10px; display: none; text-align: center; }
    </style>
</head>
<body>

    <div class="box">
        <h2 id="title">Welcome Back</h2>
        <p id="subtitle">Enter your details to sign in</p>
        
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="name@example.com">
        </div>

        <div class="form-group" id="password-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <div class="checkbox-group" id="age-group">
            <input type="checkbox" id="ageCheck">
            <label for="ageCheck">I confirm that I am 15 years of age or older.</label>
        </div>
        
        <div class="utility-links" id="utility-area">
            <div></div>
            <div class="link-item" onclick="switchViewState('forgot')">Forgot Password?</div>
        </div>

        <button onclick="handleAuthAction()" id="mainBtn">Sign In</button>
        
        <div id="error-msg"></div>
        <div id="success-msg"></div>

        <div class="toggle-text" id="toggleArea">
            Don't have an account? <span onclick="switchViewState('signup')">Sign Up</span>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="auth.js"></script>

    <script>
        async function checkPasswordRecoverySession() {
            const currentUrl = window.location.href;
            
            // Check if the landing URL contains Supabase identity recovery parameters
            if (currentUrl.includes("type=recovery") || window.location.hash.includes("type=recovery")) {
                console.log("Password reset traffic confirmed. Triggering prompt layer...");
                
                // Brief pause to allow the Supabase client instance to catch and mount the hash token
                setTimeout(async () => {
                    const newPassword = prompt("Please enter your new secure password:");
                    
                    if (!newPassword || newPassword.trim().length < 6) {
                        alert("Password update cancelled or too short (must be at least 6 characters).");
                        return;
                    }

                    // Push the fresh password rewrite data payload down to the user instance
                    const { data, error } = await _supabase.auth.updateUser({
                        password: newPassword.trim()
                    });

                    if (error) {
                        alert("Reset routine failed: " + error.message);
                    } else {
                        alert("Success! Your password has been updated. Please log in with your new password.");
                        
                        // Clear hash tags from the browser address bar so the prompt doesn't loop
                        window.location.hash = "";
                        window.location.search = "";
                        
                        // FIX: Refresh back to the clean home login state instead of bypassing to input.html
                        window.location.href = "index.html";
                    }
                }, 800);
            }
        }

        // Initialize execution instantly on interface mount
        checkPasswordRecoverySession();
    </script>
</body>
</html>
