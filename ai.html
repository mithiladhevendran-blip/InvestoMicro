<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Result - InvestoMicro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            padding: 40px; 
            max-width: 520px; 
            margin: auto; 
            text-align: center; 
            background: #0f172a; 
            color: white; 
            display: flex; 
            align-items: center; 
            min-height: 100vh; 
        }
        .card { 
            padding: 30px; 
            border-radius: 24px; 
            background: #1e293b; 
            border: 1px solid #334155; 
            width: 100%; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        h3 { 
            color: #60a5fa; 
            font-size: 1.55rem; 
            margin: 20px 0; 
            letter-spacing: -0.5px; 
        }
        .desc { 
            color: #94a3b8; 
            line-height: 1.6; 
            margin-bottom: 25px; 
            min-height: 60px; 
        }
        button { 
            padding: 16px; 
            background: #3b82f6; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%; 
            transition: 0.2s; 
            font-size: 1.05rem;
        }
        button:hover { background: #2563eb; transform: translateY(-2px); }
        button:disabled { background: #475569; cursor: not-allowed; transform: none; }
        .status { font-size: 0.75rem; color: #64748b; margin-top: 12px; }
        .confidence { font-size: 0.8rem; color: #22c55e; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: #94a3b8; font-size: 1rem; text-transform: uppercase; letter-spacing: 2px;">AI Spend Analysis</h2>
        <h3 id="cat">Analyzing SMS...</h3>
        <p id="desc" class="desc"></p>
        <button id="saveBtn" onclick="saveToCloud()">Confirm & Save</button>
        <p id="saveStatus" class="status"></p>
    </div>

<script type="module">
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.6.0';
    env.allowLocalModels = false;

    const S_URL = 'https://funcvigewkhauenqxrbf.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1bmN2aWdld2toYXVlbnF4cmJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NTM1MzQsImV4cCI6MjA5NDEyOTUzNH0.INR7nkrv-CV80i97SyaHwdZd3chlQjaVgNsQY39Nqxo';
    
    const _supabase = supabase.createClient(S_URL, S_KEY);

    const sms = (localStorage.getItem('lastSMS') || "").trim();
    const catElement = document.getElementById('cat');
    const descElement = document.getElementById('desc');
    const saveBtn = document.getElementById('saveBtn');

    let finalCategory = "Short Term / Not Necessary";
    let finalAmount = 0;
    let confidence = 0;

    // === Improved Amount Extraction ===
    function extractAmount(text) {
        // Matches common Indian formats: 450, ₹450, Rs. 1,250.50, 1250 etc.
        const regex = /(?:₹|Rs\.?|INR)?\s*(\d{1,3}(?:,\d{3})*|\d+)(?:\.\d{1,2})?/gi;
        let match;
        let maxAmount = 0;
        
        while ((match = regex.exec(text)) !== null) {
            const num = parseFloat(match[1].replace(/,/g, ''));
            if (num > maxAmount) maxAmount = num;
        }
        return maxAmount;
    }

    finalAmount = extractAmount(sms);

    // === Better Labels ===
    const labels = [
        "Long Term Necessary",      // Education, rent, insurance, medical, etc.
        "Short Term Important",     // Groceries, milk, transport, daily needs
        "Short Term Not Necessary", // Luxury, entertainment, impulse
        "Long Term Not Necessary"   // Big non-essential purchases
    ];

    async function runAnalysis() {
        saveBtn.disabled = true;
        catElement.innerText = "AI Analyzing...";

        try {
            const classifier = await pipeline('zero-shot-classification', 
                'Xenova/distilbert-base-uncased-mnli-all-mini-v2', 
                { quantized: true }
            );

            // Better hypothesis template for financial context
            const hypothesisTemplate = "This expense is {}.";
            
            const output = await classifier(sms, labels, {
                hypothesisTemplate: hypothesisTemplate,
                multi_label: false
            });

            finalCategory = output.labels[0];
            confidence = (output.scores[0] * 100).toFixed(1);

            descElement.innerHTML = `
                AI classified this as <strong>${finalCategory}</strong><br>
                <span class="confidence">Confidence: ${confidence}%</span>
            `;

        } catch (e) {
            console.error("AI failed:", e);
            descElement.innerText = "Using smart rules (offline mode)...";
            finalCategory = applyFallbackRules(sms);
        }

        catElement.innerText = finalCategory;
        saveBtn.disabled = false;
        saveBtn.innerText = `Confirm & Save ₹${finalAmount}`;
    }

    // === Stronger Fallback Rules ===
    function applyFallbackRules(text) {
        const lower = text.toLowerCase();

        // Education & Long-term Necessary
        if (/textbook|book|school|college|fee|tuition|exam|education|course|class|uniform/i.test(lower)) {
            return "Long Term Necessary";
        }
        if (/rent|house|emi|loan|insurance|medical|hospital|doctor|medicine/i.test(lower)) {
            return "Long Term Necessary";
        }
        if (/grocery|milk|vegetable|rice|atta|gas|electricity|water|internet/i.test(lower)) {
            return "Short Term Important";
        }
        if (/movie|game|hotel|restaurant|party|shopping|clothes|shoes/i.test(lower)) {
            return "Short Term Not Necessary";
        }

        return "Short Term Not Necessary"; // default
    }

    window.saveToCloud = async () => {
        saveBtn.innerText = "Saving to cloud...";
        saveBtn.disabled = true;

        try {
            const { data: { user } } = await _supabase.auth.getUser();
            
            if (!user) {
                alert("Please sign in first");
                saveBtn.innerText = "Confirm & Save";
                saveBtn.disabled = false;
                return;
            }

            const { error } = await _supabase.from('spends').insert([{
                user_id: user.id,
                category: finalCategory,
                description: sms,
                amount: finalAmount,
                created_at: new Date().toISOString()
            }]);

            if (!error) {
                window.location.href = 'patterns.html';
            } else {
                throw error;
            }
        } catch (err) {
            console.error(err);
            alert("Save failed: " + (err.message || err));
            saveBtn.innerText = "Try Again";
            saveBtn.disabled = false;
        }
    };

    // Auto-run
    if (!sms) {
        catElement.innerText = "No SMS found";
        descElement.innerText = "Please go back and select a message.";
    } else {
        runAnalysis();
    }
</script>
</body>
</html>
